<!DOCTYPE html>
<html lang="pt-PT" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Studio Pro - Engineered by Adriano</title>
  
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#10111B" />
  <link rel="icon" type="image/png" href="icone-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200..800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { 
            panelDark: '#10111B',
            cinzaGPT: '#343540',
            cinzaC1: '#C1C1C3',
            fundoLight: '#F4F4F4',
            greenSolid: '#05F0BD', 
            blueSolid: '#006DF0'
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      transition: background 0.5s ease;
      min-height: 100vh;
      font-size: 13px; /* Redução para caber na tela */
    }

    /* FUNDO ESCURO PROFISSIONAL */
    html.dark body {
      background-color: #10111B;
      background-image: 
        radial-gradient(circle at 15% 20%, rgba(5, 240, 189, 0.05) 0%, transparent 30%),
        radial-gradient(circle at 85% 75%, rgba(5, 240, 189, 0.05) 0%, transparent 30%),
        radial-gradient(circle at center, #343540 0%, #10111B 90%);
      background-attachment: fixed;
    }

    /* MODO CLARO COM PONTOS DE LUZ VERDE */
    html:not(.dark) body {
      background-color: #F4F4F4;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(5, 240, 189, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(5, 240, 189, 0.1) 0%, transparent 40%);
    }

    /* PAINÉIS COMPACTOS */
    .neon-panel {
      border: 1px solid rgba(5, 240, 189, 0.15);
      backdrop-filter: blur(10px);
      padding: 1.5rem; /* Reduzido de 2.5rem para caber na tela */
      border-radius: 1.5rem;
    }

    html.dark .neon-panel { background-color: rgba(16, 17, 27, 0.7); }
    
    html:not(.dark) .neon-panel {
      background-color: #C1C1C3 !important; 
      border: 2px solid #343540 !important; 
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2) !important; 
    }

    html:not(.dark) h1, html:not(.dark) h2, html:not(.dark) label, html:not(.dark) p { color: #18181B !important; }

    /* BOTÃO GERAR PROMPTS (Fixado Branco com Borda Verde) */
    .btn-forjar {
      background-color: #FFFFFF !important;
      color: #343540 !important;
      border: 2px solid #05F0BD !important;
      box-shadow: 0 5px 15px rgba(5, 240, 189, 0.2);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 1rem;
      border-radius: 1rem;
      transition: all 0.2s ease;
      width: 100%;
    }
    .btn-forjar:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(5, 240, 189, 0.4); }

    /* CARTÕES DE MISSÃO (Lógica: Fixo Azul, Hover Verde) */
    .btn-niche {
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid #52525B;
      padding: 1rem;
      border-radius: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.2s ease;
    }
    .btn-niche i { color: #05F0BD !important; font-size: 1.8rem; }
    .btn-niche:hover { border-color: #05F0BD !important; color: #05F0BD !important; transform: scale(1.03); }
    .active-niche { border-color: #006DF0 !important; color: #006DF0 !important; background-color: rgba(0, 109, 240, 0.05); }

    /* BOTÕES TÉCNICOS (Hardware Pro: Fixo Verde, Hover Azul) */
    .btn-tech {
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid #52525B;
      padding: 0.6rem;
      border-radius: 0.75rem;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      transition: all 0.2s ease;
    }
    .btn-tech:hover { border-color: #006DF0 !important; color: #006DF0 !important; }
    .active-tech { border-color: #05F0BD !important; color: #05F0BD !important; background-color: rgba(5, 240, 189, 0.05); }

    /* MODO CLARO - CARTÕES BRANCOS */
    html:not(.dark) .btn-niche, html:not(.dark) .btn-tech {
      background-color: #FFFFFF !important;
      border-color: #343540 !important;
      color: #18181B !important;
    }

    .icon-tech-gradient {
      background: linear-gradient(135deg, rgba(5, 240, 189, 0.3) 0%, #006DF0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .icon-squircle { border-radius: 30%; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #05F0BD; border-radius: 10px; }
  </style>
</head>
<body class="text-zinc-900 dark:text-zinc-100 overflow-x-hidden antialiased">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const NICHES = [
      { id: 'profissoes', name: 'Profissões', icon: 'ph-bold ph-briefcase-metal' },
      { id: 'casamento', name: 'Casamento', icon: 'ph-bold ph-star-four' },
      { id: 'infantil', name: 'Infantil', icon: 'ph-bold ph-balloon' },
      { id: 'gestante', name: 'Gestante', icon: 'ph-bold ph-baby' },
      { id: 'influencer', name: 'Influencer', icon: 'ph-bold ph-instagram-logo' },
      { id: 'fitness', name: 'Fitness', icon: 'ph-bold ph-barbell' },
      { id: 'aniversario', name: 'Aniversário', icon: 'ph-bold ph-cake' },
      { id: 'moda', name: 'Moda', icon: 'ph-bold ph-coat-hanger' },
      { id: 'restauracao', name: 'Restauração', icon: 'ph-bold ph-image-square' } 
    ];

    function MainApp({ onLogout, isDark, toggleTheme }) {
      const [selectedNiche, setSelectedNiche] = useState('infantil');
      const [visualStyle, setVisualStyle] = useState('Ultra-realista');
      const [aspectRatio, setAspectRatio] = useState('9:16 Vertical');

      return (
        <div className="flex flex-col max-h-screen overflow-hidden">
          <header className="px-6 py-4 flex items-center justify-between border-b border-white/5 bg-panelDark/20 backdrop-blur-md">
            <div className="flex items-center gap-3">
               <div className="w-10 h-10 icon-squircle bg-panelDark flex items-center justify-center border border-greenSolid">
                  <i className="ph-bold ph-aperture text-2xl text-greenSolid"></i>
               </div>
               <div>
                  <h1 className="text-lg font-black uppercase italic tracking-tighter leading-none">Studio <span className="text-greenSolid">Pro</span></h1>
                  <p className="text-[7px] font-bold text-zinc-500 uppercase tracking-widest">Engineered by Adriano</p>
               </div>
            </div>
            <div className="flex items-center gap-3">
              <button onClick={toggleTheme} className="w-9 h-9 rounded-lg border border-zinc-200 dark:border-white/10 flex items-center justify-center text-zinc-500 hover:text-greenSolid">
                {isDark ? <i className="ph-bold ph-sun text-lg"></i> : <i className="ph-bold ph-moon text-lg"></i>}
              </button>
              <button onClick={onLogout} className="w-9 h-9 rounded-lg bg-red-600/10 text-red-500 hover:bg-red-600 hover:text-white transition-all">
                <i className="ph-bold ph-power text-lg"></i>
              </button>
            </div>
          </header>

          <main className="p-4 grid grid-cols-12 gap-4 max-w-[1400px] mx-auto w-full">
            <div className="col-span-8 flex flex-col gap-4">
              
              <section className="neon-panel">
                <div className="flex items-center gap-3 mb-4">
                  <i className="ph-bold ph-scan text-xl icon-tech-gradient"></i>
                  <h2 className="text-[10px] font-black uppercase tracking-widest">Scan de Identidade</h2>
                </div>
                <div className="w-24 h-24 border-2 border-dashed border-zinc-500 rounded-2xl flex items-center justify-center cursor-pointer hover:border-greenSolid transition-all">
                   <i className="ph-bold ph-user-focus text-3xl text-zinc-500"></i>
                </div>
              </section>

              <section className="neon-panel">
                <div className="flex items-center gap-3 mb-4">
                  <i className="ph-bold ph-target text-xl icon-tech-gradient"></i>
                  <h2 className="text-[10px] font-black uppercase tracking-widest">Missão Técnica</h2>
                </div>
                <div className="grid grid-cols-3 gap-3">
                  {NICHES.map(n => (
                    <button key={n.id} onClick={()=>setSelectedNiche(n.id)} className={`btn-niche ${selectedNiche === n.id ? 'active-niche' : ''}`}>
                      <i className={n.icon}></i>
                      <span className="text-[8px] font-black uppercase">{n.name}</span>
                    </button>
                  ))}
                </div>
              </section>
            </div>

            <div className="col-span-4 flex flex-col gap-4">
              <section className="neon-panel flex-1">
                <div className="flex items-center gap-3 mb-6">
                  <i className="ph-bold ph-cpu text-xl icon-tech-gradient"></i>
                  <h2 className="text-[10px] font-black uppercase tracking-widest">Hardware Pro</h2>
                </div>
                
                <div className="space-y-6">
                  <div>
                    <label className="text-[8px] font-black uppercase mb-3 block opacity-60">Estilo Visual</label>
                    <div className="grid grid-cols-2 gap-2">
                      {['Ultra-realista', 'Luxo Premium', 'Estúdio', 'Cinematográfico'].map(s => (
                        <button key={s} onClick={()=>setVisualStyle(s)} className={`btn-tech ${visualStyle === s ? 'active-tech' : ''}`}>{s}</button>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className="text-[8px] font-black uppercase mb-3 block opacity-60">Proporção</label>
                    <div className="grid grid-cols-2 gap-2">
                      {['9:16 Vertical', '16:9 Horizontal', '1:1 Quadrado', '4:5 Feed'].map(a => (
                        <button key={a} onClick={()=>setAspectRatio(a)} className={`btn-tech ${aspectRatio === a ? 'active-tech' : ''}`}>{a}</button>
                      ))}
                    </div>
                  </div>

                  <div className="pt-4">
                    <button className="btn-forjar">Gerar Prompts</button>
                  </div>
                </div>
              </section>
            </div>
          </main>
        </div>
      );
    }

    function App() {
      const [session, setSession] = useState(true);
      const [isDark, setIsDark] = useState(true);

      const toggleTheme = () => {
        setIsDark(!isDark);
        document.documentElement.classList.toggle('dark');
      };

      return <MainApp onLogout={()=>setSession(false)} isDark={isDark} toggleTheme={toggleTheme} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
