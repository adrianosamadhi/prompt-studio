<!DOCTYPE html>
<html lang="pt-PT" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Studio Pro - Engineered by Adriano Santos</title>
  
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#000000" />
  <link rel="icon" type="image/png" href="icone-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { 
            panelDark: '#000000',
            greenSolid: '#05F0BD', 
            blueSolid: '#006DF0'
          },
          fontFamily: { 
            sans: ['Plus Jakarta Sans', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace']
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      transition: background-color 0.4s ease, color 0.4s ease;
      height: 100vh;
      overflow: hidden; 
      font-size: 13px; 
    }

    /* MODO ESCURO - DARK PIANO */
    html.dark body {
      background-color: #000000;
      background-image: 
        radial-gradient(circle at 20% 0%, rgba(5, 240, 189, 0.04) 0%, transparent 25%),
        radial-gradient(circle at 80% 100%, rgba(0, 109, 240, 0.04) 0%, transparent 25%);
    }

    /* MODO CLARO */
    html:not(.dark) body {
      background-color: #E5E7EB; 
      color: #111827;
    }

    /* PAINÉIS */
    .neon-panel {
      border-radius: 1.25rem;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
    }

    /* GLASSMORPHISM DARK PIANO */
    html.dark .neon-panel { 
      background: linear-gradient(180deg, rgba(24, 24, 27, 0.8) 0%, rgba(0, 0, 0, 0.95) 100%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05), 0 10px 30px rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(20px);
    }
    
    html:not(.dark) .neon-panel {
      background-color: #FFFFFF !important; 
      border: 1px solid #D1D5DB !important; 
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05) !important; 
    }

    html:not(.dark) h1, html:not(.dark) h2, html:not(.dark) label, 
    html:not(.dark) p:not(.text-blueSolid):not(.text-greenSolid),
    html:not(.dark) span:not(.text-blueSolid):not(.text-greenSolid) { 
      color: #1F2937 !important; 
    }

    /* BOTÃO PRINCIPAL */
    .btn-forjar {
      background-color: #FFFFFF !important;
      color: #1F2937 !important; 
      border: 3px solid #05F0BD !important;
      box-shadow: 0 4px 15px rgba(5, 240, 189, 0.2);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.85rem;
      border-radius: 1rem;
      transition: all 0.2s ease;
      width: 100%;
      font-size: 14px; 
    }
    .btn-forjar:hover:not(:disabled) { 
      transform: translateY(-2px); 
      box-shadow: 0 6px 20px rgba(5, 240, 189, 0.35); 
    }
    .btn-forjar:disabled { opacity: 0.6; cursor: not-allowed; }

    /* CARTÕES DE MISSÃO */
    .btn-niche {
      background-color: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.85rem;
      border-radius: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.2s ease;
    }
    .btn-niche i { color: #05F0BD !important; font-size: 1.8rem; }
    .btn-niche:hover { border-color: #05F0BD !important; color: #05F0BD !important; transform: scale(1.02); }
    .active-niche { border-color: #006DF0 !important; color: #006DF0 !important; background-color: rgba(0, 109, 240, 0.1); }

    /* BOTÕES TÉCNICOS */
    .btn-tech {
      background-color: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.6rem;
      border-radius: 0.6rem;
      font-size: 11px; 
      font-weight: 800;
      text-transform: uppercase;
      transition: all 0.2s ease;
    }
    .btn-tech:hover { border-color: #006DF0 !important; color: #006DF0 !important; }
    .active-tech { border-color: #05F0BD !important; color: #05F0BD !important; background-color: rgba(5, 240, 189, 0.1); }

    /* MODO CLARO BOTÕES INATIVOS */
    html:not(.dark) .btn-niche, html:not(.dark) .btn-tech {
      background-color: #F9FAFB !important;
      border-color: #D1D5DB !important;
      color: #374151 !important;
    }

    /* INPUTS GERAIS */
    .cyber-input {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #FFFFFF;
      padding: 0.75rem 1rem;
      font-size: 13px; 
    }
    html:not(.dark) .cyber-input {
      background: #F3F4F6 !important;
      border: 1px solid #D1D5DB !important;
      color: #111827 !important;
    }

    .logo-gradient {
      background: linear-gradient(135deg, #05F0BD 0%, #006DF0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .icon-tech-gradient {
      background: linear-gradient(135deg, #05F0BD 0%, #006DF0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .icon-squircle { border-radius: 28%; }
    
    .scroll-area {
      overflow-y: auto;
      padding-right: 0.5rem;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #05F0BD; border-radius: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body class="text-zinc-100 antialiased">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SUPABASE_URL = "https://wvejrqpwmodgfjtxperb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Co_Sc9s65LlNw2L1a19EBw_enm2KWFp";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function fetchWithRetry(payload, retries = 3) {
      const GEMINI_MODELS = ["gemini-3.1-pro-preview", "gemini-3.1-flash-lite"];
      for (let m = 0; m < GEMINI_MODELS.length; m++) {
        const currentModel = GEMINI_MODELS[m];
        for (let i = 0; i < retries; i++) {
          try {
            const { data, error } = await supabase.functions.invoke('gerar-prompt', {
              body: JSON.stringify({ model: currentModel, payload: payload })
            });
            if (error) throw error;
            return data;
          } catch (e) {
            if (i === retries - 1 && m === GEMINI_MODELS.length - 1) throw e;
            await new Promise(res => setTimeout(res, 1000));
          }
        }
      }
    }

    async function generatePromptsAPI({ imagePreviews, niche, customNiche, freePrompt, extraDetails, visualStyle, aspectRatio, quantity, realismLevel, isRestoration, colorize }) {
      let targetNiche = customNiche.trim() !== '' ? customNiche : niche;
      if (isRestoration && customNiche.trim() === '') {
        targetNiche = "Vintage Photo Professional Restoration"; 
      }

      // CORREÇÃO CRÍTICA DA PROPORÇÃO: Se for Original, instrui a IA a espelhar o formato nativo da foto
      const arParam = aspectRatio === 'Original' 
        ? 'Match the exact aspect ratio of the original reference image (image_0.png)' 
        : "--ar " + aspectRatio.split(' ')[0];
        
      const actualQuantity = isRestoration ? 1 : quantity;

      const systemInstruction = `ROLE & OBJECTIVE: You are an expert Image Descriptor Engine. 
Your objective is to generate high-fidelity blueprint descriptions of target images formatted inside a declarative JSON array. 
The downstream execution layer will read this JSON directly to render the image.

CRITICAL RESTORATION RULE:
If the mode is Restoration, you must act as a master photo restorer.
- Do NOT describe artifacts, dust, tears, tape, chemical degradation, or aging damage.
- Recreate the pristine, brand-new visual state of the subjects and environment from the reference image.
- COLOR POLICY: Carefully analyze image_0.png. If it contains original color data (even if shifted, faded, or purplish due to age), you MUST restore it to full, vibrant, natural realistic colors. 
- ONLY if the original image is strictly Black and White or Sepia, apply the colorize flag setting:
  * If COLORIZE is true: generate a prompt to colorize it with realistic historical colors.
  * If COLORIZE is false: preserve it as a clean, beautiful, high-contrast monochrome black and white image, completely removing chemical aging tints.

OUTPUT DISCIPLINE: RETURN ONLY A VALID RAW JSON ARRAY. NO MARKDOWN. NO \`\`\`json.`;

      const restorationInstruction = isRestoration 
        ? `\n\n[RESTORATION DIRECTIVE]
           - Analyze the individuals, poses, clothes, and domestic/external layout of image_0.png.
           - Generate a flawless descriptive rendering profile of this scene.
           - Strip all physical image wear, scratches, fading, and borders. Describe it as a brand new capture.
           - Aspect Ratio Policy: ${aspectRatio === 'Original' ? 'Detect and maintain the exact physical aspect ratio of the original image_0.png.' : 'Force aspect ratio to ' + arParam}
           - Color Handling: Check if the original has color. If yes, restore to natural color. If strictly monochrome, apply toggle state: ${colorize ? 'Realistic colorization' : 'Clean high-contrast black and white'}.`
        : '';

      let promptText = `Create exactly ${actualQuantity} clean declarative JSON object configuration profiles in a root array.

Context for creation profile:
- Theme/Niche: ${targetNiche}
- Render Style profile: ${visualStyle}
- Realism Profile: ${realismLevel}
- Specific Scenario details: ${extraDetails || 'None'}
${restorationInstruction}

REQUIRED CLEAN STRUCTURE SCHEMATIC (Each item must fill out this semantic payload structure):
{
  "image_description": "${isRestoration ? 'A flawless professionally restored high-fidelity photograph showing [Describe the clear subjects and scene]' : 'A stunning high-fidelity photograph showing [Describe the main scene]'}",
  "subject_biometrics": {
    "primary_subject_identity": "[Detailed description of people/subjects from reference image, represented crystal clear]",
    "body_proportions": "[Exact build, athletic/youthful profile, and stance extracted safely]",
    "facial_architecture": "[Face shape, sharp features, clear skin details, jawline]",
    "hair_and_complexion": "[Accurate hair styling, volume, and skin tones]",
    "expressions": "[Natural genuine facial expressions and mood]",
    "clothing_profile": "${isRestoration ? '[Describe the original clothing items completely clean, brand new fabric texture]' : '[Describe thematic custom clothes matching the niche]'}"
  },
  "spatial_composition": {
    "subject_pose": "${isRestoration ? 'Pristine reproduction of the exact original poses and interaction' : '[Detailed unique pose setting]'}",
    "clothing_style_override": "${isRestoration ? 'Cleaned flawless original outfit capture' : '[Outfit style elements]'}"
  },
  "scenery_environment": {
    "location_details": "${isRestoration ? 'Perfect clean reproduction of the background scene from reference image' : 'Immersive environment matching ' + targetNiche}",
    "foreground_elements": "${extraDetails || 'Harmonious pristine background detailing matching the scenario'}"
  },
  "camera_and_optics": {
    "framing": "${isRestoration ? 'Exact matching original group/individual camera framing' : '[Cinematic specific framing format]'}",
    "lens_angle": "Eye level, clean perspective"
  },
  "lighting_signature": {
    "lighting_type": "${isRestoration ? 'Clean corrected camera flash illumination, optimized exposure, high contrast' : 'Professional optimized environment lighting'}"
  },
  "rendering_style_profile": {
    "type_value": "${isRestoration ? 'Masterpiece photo restoration print, crystal clear, 8k resolution, removed noise and artifacts' : visualStyle}",
    "aspect_ratio_parameter": "${aspectRatio === 'Original' ? 'Match the exact aspect ratio of the original reference image' : arParam}",
    "chromatic_profile": "${isRestoration ? '[Auto-detect: If original image has color data, value is full natural color. If original is monochrome, follow toggle settings]' : 'Standard profile'}"
  }
}`;

      const payload = {
        systemInstruction: { parts: [{ text: systemInstruction }] },
        contents: [{ role: "user", parts: [{ text: promptText }] }],
        generationConfig: { responseMimeType: "application/json" }
      };

      if (imagePreviews && imagePreviews.length > 0) {
        imagePreviews.forEach((preview) => {
          const base64Data = preview.split(',')[1];
          const mimeType = preview.split(';')[0].split(':')[1];
          payload.contents[0].parts.push({ inlineData: { mimeType, data: base64Data } });
        });
      }

      const data = await fetchWithRetry(payload);
      let textResult = data.candidates?.[0]?.content?.parts?.[0]?.text || "[]";
      
      textResult = textResult.replace(/```json/gi, '').replace(/```/g, '').trim();
      
      let parsedData = [];
      try {
         parsedData = JSON.parse(textResult);
         if (parsedData.prompts) parsedData = parsedData.prompts;
         else if (!Array.isArray(parsedData)) parsedData = [parsedData];
      } catch(e) {
         console.error("Erro no Parse do JSON:", e, textResult);
         parsedData = [{ prompt: textResult }]; 
      }

      return parsedData.map(item => {
        const displayPrompt = JSON.stringify(item, null, 2);
        return { prompt: displayPrompt, id: crypto.randomUUID() };
      });
    }

    const NICHES = [
      { id: 'profissoes', name: 'Profissões', icon: 'ph-bold ph-briefcase-metal' },
      { id: 'casamento', name: 'Casamento', icon: 'ph-bold ph-star-four' },
      { id: 'infantil', name: 'Infantil', icon: 'ph-bold ph-balloon' },
      { id: 'gestante', name: 'Gestante', icon: 'ph-bold ph-baby' },
      { id: 'influencer', name: 'Influencer', icon: 'ph-bold ph-instagram-logo' },
      { id: 'fitness', name: 'Fitness', icon: 'ph-bold ph-barbell' },
      { id: 'aniversario', name: 'Aniversário', icon: 'ph-bold ph-cake' },
      { id: 'moda', name: 'Moda', icon: 'ph-bold ph-coat-hanger' },
      { id: 'restauracao', name: 'Restauração', icon: 'ph-bold ph-image-square' } 
    ];

    function MainApp({ onLogout, isDark, toggleTheme }) {
      const [imagePreviews, setImagePreviews] = useState([]);
      const [selectedNiche, setSelectedNiche] = useState('');
      const [customNiche, setCustomNiche] = useState('');
      const [freePrompt, setFreePrompt] = useState('');
      const [extraDetails, setExtraDetails] = useState('');
      
      const [visualStyle, setVisualStyle] = useState('Ultra-realista');
      const [realismLevel, setRealismLevel] = useState('natural');
      const [aspectRatio, setAspectRatio] = useState('9:16 Vertical');
      const [quantity, setQuantity] = useState(10);
      const [colorize, setColorize] = useState(false); 
      
      const [prompts, setPrompts] = useState([]);
      const [isGenerating, setIsGenerating] = useState(false);
      
      const [toastMessage, setToastMessage] = useState(null);
      const scrollRef = useRef(null);

      const showToast = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(null), 3000);
      };

      const handleImageUpload = (e) => {
        const files = Array.from(e.target.files);
        files.forEach(file => {
          const reader = new FileReader();
          reader.onloadend = () => setImagePreviews(prev => [...prev, reader.result]);
          reader.readAsDataURL(file);
        });
      };

      // CONTROLADOR SELETOR DE NICHO INTELIGENTE
      const selectNicheHandler = (nicheId) => {
        setSelectedNiche(nicheId);
        setFreePrompt('');
        if (nicheId === 'restauracao') {
          setAspectRatio('Original'); // Trava no formato nativo da foto automaticamente
        } else {
          setAspectRatio('9:16 Vertical'); // Volta pro padrão comercial nos outros nichos
        }
      };

      const generate = async () => {
        if (!selectedNiche && !customNiche && !freePrompt) {
          alert("Por favor, selecione um nicho ou descreva a missão.");
          return;
        }

        setIsGenerating(true);
        
        try {
          const result = await generatePromptsAPI({
            imagePreviews, 
            niche: selectedNiche, 
            customNiche, 
            freePrompt, 
            extraDetails,
            visualStyle, 
            aspectRatio, 
            quantity,
            realismLevel,
            isRestoration: selectedNiche === 'restauracao',
            colorize
          });
          
          setPrompts(result);
          
          setTimeout(() => {
            if (scrollRef.current) {
              scrollRef.current.scrollTo({ top: scrollRef.current.scrollHeight, behavior: 'smooth' });
            }
          }, 200);
        } catch (error) {
          alert("Falha de conexão com a API de IA. Erro: " + error.message);
        } finally {
          setIsGenerating(false);
        }
      };

      const copyAll = () => {
        const text = prompts.map(p => p.prompt).join('\n\n');
        navigator.clipboard.writeText(text);
        showToast("Todos os JSON copiados!");
      };

      return (
        <div className="flex flex-col h-screen relative">
          <header className="px-6 py-4 flex items-center justify-between border-b border-zinc-800/50 dark:border-white/5 bg-white/50 dark:bg-black/50 backdrop-blur-md shrink-0 z-50">
            <div className="flex items-center gap-4">
               <div className="w-10 h-10 icon-squircle bg-zinc-100 dark:bg-black flex items-center justify-center border border-greenSolid shadow-sm">
                  <i className="ph-bold ph-aperture text-2xl text-greenSolid"></i>
               </div>
               <div>
                  <h1 className="text-xl font-black uppercase italic tracking-tighter leading-none">Studio <span className="text-greenSolid">Pro</span></h1>
                  <p className="text-[9px] font-bold text-zinc-500 uppercase tracking-widest mt-1">Engineered by Adriano Santos</p>
               </div>
            </div>
            <div className="flex items-center gap-3">
              <button onClick={toggleTheme} className="w-10 h-10 rounded-xl border border-zinc-300 dark:border-white/10 flex items-center justify-center text-zinc-500 hover:text-greenSolid bg-white dark:bg-transparent shadow-sm">
                {isDark ? <i className="ph-bold ph-sun text-xl"></i> : <i className="ph-bold ph-moon text-xl"></i>}
              </button>
              <button onClick={onLogout} className="w-10 h-10 rounded-xl bg-red-100 text-red-600 dark:bg-red-600/10 dark:text-red-500 hover:bg-red-600 hover:text-white transition-all shadow-sm">
                <i className="ph-bold ph-power text-xl"></i>
              </button>
            </div>
          </header>

          <main className="flex-1 flex overflow-hidden max-w-[1500px] mx-auto w-full p-4 gap-5">
            <div className="w-2/3 flex flex-col gap-5 scroll-area" ref={scrollRef}>
              
              <section className="neon-panel shrink-0">
                <div className="flex items-center gap-3 mb-4">
                  <i className="ph-bold ph-scan text-xl icon-tech-gradient"></i>
                  <h2 className="text-[12px] font-black uppercase tracking-widest">Imagem de Referência</h2>
                </div>
                <div className="flex gap-4 overflow-x-auto pb-2">
                  {imagePreviews.map((src, i) => (
                    <div key={i} className="relative w-28 h-28 shrink-0 rounded-2xl overflow-hidden border-2 border-blueSolid shadow-md">
                      <img src={src} className="w-full h-full object-cover" />
                      <button onClick={()=>setImagePreviews(prev=>prev.filter((_,idx)=>idx!==i))} className="absolute top-2 right-2 w-7 h-7 bg-red-600 text-white rounded-lg flex items-center justify-center"><i className="ph-bold ph-trash-simple text-sm"></i></button>
                    </div>
                  ))}
                  <label className="w-28 h-28 shrink-0 rounded-2xl border-2 border-dashed border-zinc-400 dark:border-zinc-600 flex flex-col items-center justify-center cursor-pointer hover:border-greenSolid transition-all gap-2 bg-zinc-50 dark:bg-transparent">
                    <i className="ph-bold ph-upload-simple text-2xl text-zinc-500"></i>
                    <span className="text-[10px] font-black uppercase text-zinc-500 text-center leading-tight">Faça o<br/>Upload</span>
                    <input type="file" className="hidden" multiple onChange={handleImageUpload} accept="image/*" />
                  </label>
                </div>
              </section>

              <section className="neon-panel shrink-0">
                <div className="flex items-center gap-3 mb-5">
                  <i className="ph-bold ph-target text-xl icon-tech-gradient"></i>
                  <h2 className="text-[12px] font-black uppercase tracking-widest">Missão Técnica</h2>
                </div>
                
                <div className="grid grid-cols-3 gap-3 mb-5">
                  {NICHES.map(n => (
                    <button key={n.id} onClick={()=>selectNicheHandler(n.id)} className={`btn-niche ${selectedNiche === n.id ? 'active-niche' : ''}`}>
                      <i className={n.icon}></i>
                      <span className="text-[10px] font-black uppercase tracking-wide mt-1">{n.name}</span>
                    </button>
                  ))}
                </div>

                <textarea 
                  value={freePrompt}
                  onChange={e=>{setFreePrompt(e.target.value); setSelectedNiche('');}}
                  placeholder="ESCREVA O CÓDIGO DA MISSÃO (PROMPT MANUAL)..."
                  className="cyber-input w-full rounded-2xl h-20 resize-none font-bold placeholder:text-zinc-500 mb-4"
                />

                <div className="grid grid-cols-2 gap-4">
                  <div>
                     <label className="text-[10px] font-black uppercase opacity-70 ml-2 mb-1 block">Nicho Customizado</label>
                     <input type="text" value={customNiche} onChange={e=>setCustomNiche(e.target.value)} placeholder="EX: ODONTOPEDIATRA" className="cyber-input w-full rounded-xl font-black text-greenSolid" />
                  </div>
                  <div>
                     <label className="text-[10px] font-black uppercase opacity-70 ml-2 mb-1 block">Elementos Específicos</label>
                     <input type="text" value={extraDetails} onChange={e=>setExtraDetails(e.target.value)} placeholder="EX: BALÕES, NEON" className="cyber-input w-full rounded-xl font-black" />
                  </div>
                </div>
              </section>

              {prompts.length > 0 && (
                <div className="flex flex-col gap-4 mt-2 shrink-0 pb-10">
                  <div className="flex items-center justify-between px-2">
                    <h3 className="text-[12px] font-black uppercase tracking-[0.2em] text-greenSolid">JSON Gerado (Nano Banana)</h3>
                    <button onClick={copyAll} className="text-[10px] font-bold bg-greenSolid/10 text-greenSolid border border-greenSolid/20 px-4 py-2 rounded-full hover:bg-greenSolid hover:text-white transition-all">
                      COPIAR TODOS OS JSON
                    </button>
                  </div>

                  {prompts.map((p, i) => (
                    <div key={p.id} className="neon-panel relative group !p-6 !border-l-4 !border-l-blueSolid bg-zinc-50 dark:bg-black/50">
                      <div className="flex justify-between items-start mb-3">
                        <span className="text-[11px] font-black text-blueSolid uppercase tracking-widest">Codex #{i+1}</span>
                        <button onClick={() => {navigator.clipboard.writeText(p.prompt); showToast("JSON Copiado!")}} className="text-zinc-500 hover:text-greenSolid transition-colors">
                          <i className="ph-bold ph-copy text-2xl"></i>
                        </button>
                      </div>
                      <pre className="text-[11px] font-mono leading-relaxed text-zinc-700 dark:text-zinc-300 overflow-x-auto whitespace-pre-wrap bg-zinc-200 dark:bg-zinc-900/50 p-4 rounded-xl border border-zinc-300 dark:border-white/5">
                        {p.prompt}
                      </pre>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="w-1/3 flex flex-col shrink-0 h-auto">
              <section className="neon-panel h-auto flex flex-col pb-6">
                <div className="flex items-center gap-3 mb-8">
                  <i className="ph-bold ph-cpu text-xl icon-tech-gradient"></i>
                  <h2 className="text-[12px] font-black uppercase tracking-widest">Configurações</h2>
                </div>
                
                <div className="space-y-7 mb-8">
                  
                  {selectedNiche === 'restauracao' ? (
                    <div className="p-5 border border-blueSolid/30 bg-blueSolid/5 rounded-xl animate-fade-in">
                      <label className="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" checked={colorize} onChange={e=>setColorize(e.target.checked)} className="w-5 h-5 accent-blueSolid cursor-pointer" />
                        <span className="text-[11px] font-black uppercase tracking-widest text-zinc-800 dark:text-zinc-300">Colorir Fotografia</span>
                      </label>
                      <p className="text-[9px] text-zinc-500 mt-3 uppercase tracking-widest leading-relaxed">
                        Modo Restauração ativo. O volume foi forçado para 1 unidade. Marque a caixa se a foto for P&B e desejar cores realistas.
                      </p>
                    </div>
                  ) : (
                    <div>
                      <div className="flex justify-between mb-3">
                        <label className="text-[10px] font-black uppercase opacity-70">Volume</label>
                        <span className="text-[10px] font-black text-blueSolid">{quantity}X UNIDADES</span>
                      </div>
                      <input type="range" min="1" max="20" value={quantity} onChange={e=>setQuantity(parseInt(e.target.value))} className="w-full accent-blueSolid h-1.5 rounded-full cursor-pointer bg-zinc-300 dark:bg-zinc-700" />
                    </div>
                  )}

                  <div>
                    <label className="text-[10px] font-black uppercase mb-3 block opacity-70">Estilo Visual</label>
                    <div className="grid grid-cols-2 gap-3">
                      {['Ultra-realista', 'Luxo Premium', 'Estúdio', 'Cinematográfico'].map(s => (
                        <button key={s} onClick={()=>setVisualStyle(s)} className={`btn-tech ${visualStyle === s ? 'active-tech' : ''}`}>{s}</button>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className="text-[10px] font-black uppercase mb-3 block opacity-70">Realismo</label>
                    <div className="grid grid-cols-3 gap-3">
                      {['natural', 'premium', 'cine'].map(r => (
                        <button key={r} onClick={()=>setRealismLevel(r)} className={`btn-tech ${realismLevel === r ? 'active-tech' : ''}`}>{r}</button>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className="text-[10px] font-black uppercase mb-3 block opacity-70">Proporção</label>
                    <div className="grid grid-cols-2 gap-3">
                      {/* BOTÃO EXCLUSIVO DE PROPORÇÃO ORIGINAL CONDICIONAL */}
                      {selectedNiche === 'restauracao' && (
                        <button onClick={()=>setAspectRatio('Original')} className={`btn-tech ${aspectRatio === 'Original' ? 'active-tech' : ''}`}>Original</button>
                      )}
                      {['9:16 Vertical', '16:9 Horizontal', '1:1 Quadrado', '4:5 Feed'].map(a => (
                        <button key={a} onClick={()=>setAspectRatio(a)} className={`btn-tech ${aspectRatio === a ? 'active-tech' : ''}`}>{a}</button>
                      ))}
                    </div>
                  </div>
                </div>

                <div className="pt-2">
                  <button onClick={generate} disabled={isGenerating} className="btn-forjar flex items-center justify-center gap-3 py-4">
                    {isGenerating ? (
                      <>
                        <i className="ph-bold ph-arrows-clockwise ph-spin text-2xl"></i>
                        <span>FORJANDO...</span>
                      </>
                    ) : 'GERAR JSON PROMPTS'}
                  </button>
                </div>
              </section>
            </div>
          </main>

          {/* TOAST DE NOTIFICAÇÃO DISCRETO */}
          {toastMessage && (
            <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-white dark:bg-panelDark text-zinc-900 dark:text-white border-2 border-greenSolid px-6 py-3 shadow-[0_10px_40px_rgba(5,240,189,0.3)] z-[100] flex items-center gap-3 rounded-full animate-bounce">
              <i className="ph-bold ph-check-circle text-greenSolid text-xl"></i>
              <span className="text-[11px] font-black uppercase tracking-widest">{toastMessage}</span>
            </div>
          )}
        </div>
      );
    }

    function LoginScreen() {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      
      const handleLogin = async (e) => {
        e.preventDefault();
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert("Acesso Negado: Verifique suas credenciais.");
      };

      return (
        <div className="min-h-screen bg-black flex items-center justify-center p-8">
          <form onSubmit={handleLogin} className="w-full max-w-md neon-panel flex flex-col gap-8 !bg-black">
            <div className="text-center">
              <div className="w-20 h-20 icon-squircle border-2 border-greenSolid mx-auto mb-6 flex items-center justify-center shadow-lg">
                <i className="ph-fill ph-fingerprint text-4xl text-greenSolid"></i>
              </div>
              <h1 className="text-3xl font-black uppercase italic tracking-tighter text-white">STUDIO<span className="logo-gradient ml-1">PRO</span></h1>
            </div>
            <div className="space-y-4">
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="USUÁRIO" className="cyber-input w-full rounded-2xl font-bold text-sm py-4" />
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="SENHA" className="cyber-input w-full rounded-2xl font-bold text-sm py-4" />
            </div>
            <button className="btn-forjar py-4 mt-2">ENTRAR NO SISTEMA</button>
          </form>
        </div>
      );
    }

    function App() {
      const [session, setSession] = useState(null);
      const [loading, setLoading] = useState(true);
      const [isDark, setIsDark] = useState(true);

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          setLoading(false);
        });
        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          setSession(session);
        });
        return () => subscription.unsubscribe();
      }, []);

      const toggleTheme = () => {
        setIsDark(!isDark);
        document.documentElement.classList.toggle('dark');
      };

      if (loading) {
        return (
          <div className="min-h-screen bg-black flex items-center justify-center">
             <div className="flex flex-col items-center gap-4">
                <i className="ph-bold ph-aperture ph-spin text-5xl text-greenSolid"></i>
                <span className="text-greenSolid font-black tracking-[0.3em] text-xs">CARREGANDO...</span>
             </div>
          </div>
        );
      }

      return session ? (
        <MainApp onLogout={() => supabase.auth.signOut()} isDark={isDark} toggleTheme={toggleTheme} />
      ) : (
        <LoginScreen />
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
