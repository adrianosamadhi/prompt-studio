<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Prompt Consistency Studio Pro</title>
  
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#000000" />
  <link rel="icon" type="image/png" href="icone-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200..800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { 
            background: '#000000',
            panel: '#0a0a0c',
            accent: '#00f2ff',
            accentDark: '#0066ff'
          },
          fontFamily: { 
            sans: ['Plus Jakarta Sans', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace']
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.4s ease; }

    /* Estilo Black Piano / High-Tech */
    .btn-glossy {
      background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 100%);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255,255,255,0.05);
    }
    
    .active-neon {
      background: linear-gradient(180deg, #00f2ff 0%, #0066ff 100%);
      box-shadow: 0 0 25px rgba(0, 242, 255, 0.4), inset 0 1px 2px rgba(255,255,255,0.5);
      border-color: #00f2ff !important;
      color: #000 !important;
    }

    .active-neon i { color: #000 !important; }

    .cyber-input {
      background: #ffffff;
      border: 1px solid #e4e4e7;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .dark .cyber-input {
      background: #0d0d11;
      border: 1px solid #1e1e22;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
    }
    .cyber-input:focus {
      border-color: #00f2ff;
      box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
    }

    /* Animação squircle */
    .icon-box {
      border-radius: 35% 35% 35% 35% / 35% 35% 35% 35%;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #00f2ff; }
  </style>
</head>
<body class="bg-zinc-50 dark:bg-background text-zinc-900 dark:text-zinc-100 selection:bg-accent/40 overflow-x-hidden antialiased">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const SUPABASE_URL = "https://wvejrqpwmodgfjtxperb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Co_Sc9s65LlNw2L1a19EBw_enm2KWFp";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const GEMINI_MODELS = ["gemini-3.1-pro-preview", "gemini-3.1-flash-lite"];

    async function fetchWithRetry(payload, retries = 3) {
      for (let m = 0; m < GEMINI_MODELS.length; m++) {
        const currentModel = GEMINI_MODELS[m];
        for (let i = 0; i < retries; i++) {
          try {
            const { data, error } = await supabase.functions.invoke('gerar-prompt', {
              body: JSON.stringify({ model: currentModel, payload: payload })
            });
            if (error) throw error;
            return data;
          } catch (e) {
            if (i === retries - 1 && m === GEMINI_MODELS.length - 1) throw e;
            await new Promise(res => setTimeout(res, 1000));
          }
        }
      }
    }

    async function generatePromptsAPI({ imagePreviews, niche, customNiche, freePrompt, extraDetails, visualStyle, aspectRatio, settings }) {
      const targetNiche = customNiche.trim() !== '' ? customNiche : niche;
      const qty = settings?.quantity || 10;
      const arParam = "--ar " + aspectRatio.split(' ')[0];

      const systemInstruction = `ROLE: Deterministic Prompt-to-JSON Engine. Append "${arParam}" at the very end of prompts.`;
      let promptText = freePrompt.trim() !== '' 
        ? `Variations for: "${freePrompt}". Style: ${visualStyle}.`
        : `Niche: ${targetNiche}. Style: ${visualStyle}. Realism: ${settings.realismLevel}.`;

      const payload = {
        systemInstruction: { parts: [{ text: systemInstruction }] },
        contents: [{ role: "user", parts: [{ text: promptText }] }],
        generationConfig: { responseMimeType: "application/json" }
      };

      if (imagePreviews.length > 0) {
        imagePreviews.forEach((preview) => {
          const base64Data = preview.split(',')[1];
          const mimeType = preview.split(';')[0].split(':')[1];
          payload.contents[0].parts.push({ inlineData: { mimeType, data: base64Data } });
        });
      }

      const data = await fetchWithRetry(payload);
      const textResult = data.candidates?.[0]?.content?.parts?.[0]?.text || "[]";
      return JSON.parse(textResult).map(item => ({ prompt: item.prompt, id: crypto.randomUUID() }));
    }

    // --- COMPONENTES UI SOFISTICADOS ---
    function OptionButton({ label, active, onClick }) {
      return (
        <button 
          onClick={onClick}
          className={`btn-glossy px-4 py-3 text-[9px] font-black uppercase tracking-[0.2em] rounded-xl transition-all duration-300 transform active:scale-95 ${
            active ? 'active-neon' : 'bg-zinc-100 dark:bg-[#121216] text-zinc-500 dark:text-zinc-500 hover:text-accent'
          }`}
        >
          {label}
        </button>
      );
    }

    const NICHES = [
      { id: 'aniversario', name: 'Comemoração', icon: 'ph-duotone ph-cake' },
      { id: 'profissoes', name: 'Executivo', icon: 'ph-duotone ph-briefcase-metal' },
      { id: 'influencer', name: 'Lifestyle', icon: 'ph-duotone ph-instagram-logo' },
      { id: 'casamento', name: 'Wedding', icon: 'ph-duotone ph-star-four' },
      { id: 'gestante', name: 'Maternidade', icon: 'ph-duotone ph-baby' },
      { id: 'familia', name: 'Legacy', icon: 'ph-duotone ph-users-three' },
      { id: 'musculacao', name: 'Performance', icon: 'ph-duotone ph-barbell' },
      { id: 'moda', name: 'Fashion', icon: 'ph-duotone ph-coat-hanger' }
    ];

    function MainApp({ onLogout, isDark, toggleTheme }) {
      const [imagePreviews, setImagePreviews] = useState([]);
      const [selectedNiche, setSelectedNiche] = useState('');
      const [customNiche, setCustomNiche] = useState('');
      const [freePrompt, setFreePrompt] = useState('');
      const [extraDetails, setExtraDetails] = useState('');
      const [prompts, setPrompts] = useState([]);
      const [isGenerating, setIsGenerating] = useState(false);
      const [history, setHistory] = useState([]);
      const [showHistory, setShowHistory] = useState(false);

      const [visualStyle, setVisualStyle] = useState('Ultra-realista');
      const [aspectRatio, setAspectRatio] = useState('9:16 Vertical');
      const [settings, setSettings] = useState({ quantity: 10, realismLevel: 'natural' });

      const generate = async () => {
        setIsGenerating(true);
        try {
          const result = await generatePromptsAPI({
            imagePreviews, niche: selectedNiche, customNiche, freePrompt, extraDetails,
            visualStyle, aspectRatio, settings
          });
          setPrompts(result);
          setHistory(prev => [{ date: new Date().toLocaleTimeString(), data: result }, ...prev]);
        } catch (e) { console.error(e); }
        finally { setIsGenerating(false); }
      };

      return (
        <div className="min-h-screen flex flex-col">
          <header className="sticky top-0 z-50 bg-white/70 dark:bg-black/70 backdrop-blur-xl border-b border-zinc-200 dark:border-white/5 px-10 py-5 flex items-center justify-between shadow-2xl">
            <div className="flex items-center gap-5">
               <div className="w-12 h-12 icon-box bg-accent flex items-center justify-center shadow-[0_0_20px_rgba(0,242,255,0.4)]">
                  <i className="ph-duotone ph-aperture text-3xl text-black"></i>
               </div>
               <div>
                  <h1 className="text-xl font-black uppercase italic tracking-tighter text-zinc-900 dark:text-white leading-none">Studio<span className="text-accent">Pro</span></h1>
                  <span className="text-[8px] font-black text-zinc-500 dark:text-zinc-600 uppercase tracking-[0.4em]">Engineered by AI</span>
               </div>
            </div>
            <div className="flex items-center gap-4">
              <button onClick={() => setShowHistory(!showHistory)} className="btn-glossy px-6 py-2.5 rounded-xl bg-zinc-100 dark:bg-[#121216] text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500 dark:text-zinc-500 hover:text-accent transition-all">
                Histórico
              </button>
              <button onClick={toggleTheme} className="w-11 h-11 rounded-xl border border-zinc-200 dark:border-white/5 flex items-center justify-center text-zinc-400 dark:text-orange-500 hover:bg-accent/10 transition-all">
                {isDark ? <i className="ph-duotone ph-sun-dim text-2xl"></i> : <i className="ph-duotone ph-moon-stars text-2xl"></i>}
              </button>
              <button onClick={onLogout} className="w-11 h-11 rounded-xl bg-red-600/10 text-red-500 hover:bg-red-600 hover:text-white transition-all flex items-center justify-center">
                <i className="ph-bold ph-power text-xl"></i>
              </button>
            </div>
          </header>

          <main className="max-w-[1600px] mx-auto w-full p-10 grid grid-cols-1 lg:grid-cols-12 gap-12">
            
            <div className="lg:col-span-8 flex flex-col gap-10">
              
              {/* PASSO 1 */}
              <section className="bg-white dark:bg-panel p-10 rounded-[3rem] border border-zinc-200 dark:border-white/5 shadow-2xl relative overflow-hidden">
                <div className="flex items-center gap-4 mb-10">
                  <div className="w-10 h-10 icon-box bg-accent/10 flex items-center justify-center text-accent">
                    <i className="ph-duotone ph-scan text-2xl"></i>
                  </div>
                  <h2 className="text-[11px] font-black uppercase tracking-[0.3em] text-zinc-400 dark:text-zinc-600">Scan de Identidade</h2>
                </div>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                  {imagePreviews.map((src, i) => (
                    <div key={i} className="relative aspect-square rounded-[2rem] overflow-hidden border-2 border-accent/50 shadow-2xl">
                      <img src={src} className="w-full h-full object-cover" />
                      <button onClick={()=>setImagePreviews(prev=>prev.filter((_,idx)=>idx!==i))} className="absolute top-3 right-3 w-8 h-8 bg-red-600 text-white rounded-xl flex items-center justify-center shadow-lg"><i className="ph-bold ph-trash"></i></button>
                    </div>
                  ))}
                  <label className="aspect-square rounded-[2rem] border-2 border-dashed border-zinc-300 dark:border-white/5 flex flex-col items-center justify-center cursor-pointer hover:border-accent transition-all group">
                    <i className="ph-duotone ph-user-focus text-4xl text-zinc-300 dark:text-zinc-800 group-hover:text-accent transition-all"></i>
                    <input type="file" className="hidden" onChange={(e)=>{
                       const file = e.target.files[0];
                       if(file){
                         const r = new FileReader();
                         r.onload = (ev)=>setImagePreviews(prev=>[...prev, ev.target.result]);
                         r.readAsDataURL(file);
                       }
                    }} />
                  </label>
                </div>
              </section>

              {/* PASSO 2 */}
              <section className="bg-white dark:bg-panel p-10 rounded-[3rem] border border-zinc-200 dark:border-white/5 shadow-2xl">
                <div className="flex items-center gap-4 mb-10">
                  <div className="w-10 h-10 icon-box bg-accent/10 flex items-center justify-center text-accent">
                    <i className="ph-duotone ph-target text-2xl"></i>
                  </div>
                  <h2 className="text-[11px] font-black uppercase tracking-[0.3em] text-zinc-400 dark:text-zinc-600">Diretrizes da Missão</h2>
                </div>
                
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                  {NICHES.map(n => (
                    <button key={n.id} onClick={()=>{setSelectedNiche(n.id); setFreePrompt('');}} className={`btn-glossy p-6 rounded-[2rem] border transition-all flex flex-col items-center gap-4 ${selectedNiche === n.id ? 'active-neon' : 'bg-white dark:bg-[#0d0d11] border-white/5 text-zinc-500'}`}>
                      <i className={`${n.icon} text-4xl ${selectedNiche === n.id ? 'text-black' : 'text-accent/40'}`}></i>
                      <span className="text-[9px] font-black uppercase tracking-[0.2em]">{n.name}</span>
                    </button>
                  ))}
                </div>

                <textarea 
                  value={freePrompt}
                  onChange={e=>{setFreePrompt(e.target.value); setSelectedNiche('');}}
                  placeholder="ESCREVA O CÓDIGO DA MISSÃO (PROMPT MANUAL)..."
                  className="cyber-input w-full rounded-[2rem] p-8 text-sm h-40 outline-none transition-all resize-none font-bold placeholder:text-zinc-300 dark:placeholder:text-zinc-800 tracking-wide leading-relaxed"
                />
              </section>

              {prompts.length > 0 && (
                <div className="flex flex-col gap-6 animate-fade-in">
                  <button onClick={()=>{
                      const text = prompts.map((p,i)=>`Prompt ${i+1}:\n${p.prompt}`).join('\n\n');
                      navigator.clipboard.writeText(text);
                    }} className="active-neon w-full py-6 rounded-[2rem] font-black uppercase tracking-[0.5em] text-xs shadow-2xl shadow-accent/20 transition-all hover:scale-[1.01]">
                    Copiar Todos os Resultados
                  </button>
                  <div className="flex flex-col gap-4">
                    {prompts.map((p, i) => (
                      <div key={p.id} className="bg-white dark:bg-panel p-10 rounded-[3rem] border border-zinc-200 dark:border-white/5 relative group transition-all hover:border-accent/40">
                        <div className="flex items-center gap-3 mb-6">
                           <span className="text-[9px] font-black text-accent uppercase tracking-[0.5em]">Codex Object #{String(i+1).padStart(2, '0')}</span>
                           <div className="h-px flex-1 bg-zinc-100 dark:bg-white/5"></div>
                        </div>
                        <p className="text-[11px] font-mono text-zinc-500 dark:text-zinc-400 leading-loose break-words bg-zinc-50 dark:bg-black/40 p-8 rounded-3xl border border-dashed border-zinc-200 dark:border-white/5">{p.prompt}</p>
                        <button onClick={()=>navigator.clipboard.writeText(p.prompt)} className="absolute top-10 right-10 w-12 h-12 rounded-2xl bg-accent/5 text-accent flex items-center justify-center hover:bg-accent hover:text-black transition-all shadow-lg"><i className="ph-duotone ph-copy text-2xl"></i></button>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>

            {/* COLUNA DIREITA */}
            <div className="lg:col-span-4">
              <div className="sticky top-32 flex flex-col gap-10">
                <section className="bg-white dark:bg-panel p-10 rounded-[3.5rem] border border-zinc-200 dark:border-white/5 shadow-2xl relative overflow-hidden">
                  <div className="flex items-center gap-4 mb-10">
                    <div className="w-10 h-10 icon-box bg-zinc-900 dark:bg-white text-white dark:text-black flex items-center justify-center">
                      <i className="ph-duotone ph-cpu text-2xl"></i>
                    </div>
                    <h2 className="text-[11px] font-black uppercase tracking-[0.3em] text-zinc-400 dark:text-zinc-600">Hardware Pro</h2>
                  </div>

                  <div className="flex flex-col gap-10">
                    <div>
                      <div className="flex justify-between mb-5 px-1">
                        <label className="text-[9px] font-black uppercase tracking-[0.4em] text-zinc-500">Volume</label>
                        <span className="text-[10px] font-black text-accent italic tracking-widest">{settings.quantity}X UNIDADES</span>
                      </div>
                      <input type="range" min="1" max="20" value={settings.quantity} onChange={e=>setSettings({...settings, quantity: e.target.value})} className="w-full accent-accent h-1.5 rounded-full appearance-none cursor-pointer bg-zinc-200 dark:bg-black" />
                    </div>

                    <div className="space-y-8">
                      <div>
                        <label className="text-[9px] font-black uppercase tracking-[0.4em] text-zinc-500 block mb-4 ml-1 text-center lg:text-left">Estilo Visual</label>
                        <div className="grid grid-cols-2 gap-3">
                          {['Ultra-realista', 'Luxo Premium', 'Estúdio', 'Cinematográfico'].map(s => (
                            <OptionButton key={s} label={s} active={visualStyle === s} onClick={()=>setVisualStyle(s)} />
                          ))}
                        </div>
                      </div>

                      <div>
                        <label className="text-[9px] font-black uppercase tracking-[0.4em] text-zinc-500 block mb-4 ml-1 text-center lg:text-left">Realismo</label>
                        <div className="grid grid-cols-3 gap-3">
                          {['natural', 'premium', 'cine'].map(r => (
                            <OptionButton key={r} label={r} active={settings.realismLevel === r} onClick={()=>setSettings({...settings, realismLevel: r})} />
                          ))}
                        </div>
                      </div>

                      <div>
                        <label className="text-[9px] font-black uppercase tracking-[0.4em] text-zinc-500 block mb-4 ml-1 text-center lg:text-left">Proporção</label>
                        <div className="grid grid-cols-2 gap-3">
                          {['9:16 Vertical', '16:9 Horizontal', '1:1 Quadrado', '4:5 Feed'].map(a => (
                            <OptionButton key={a} label={a} active={aspectRatio === a} onClick={()=>setAspectRatio(a)} />
                          ))}
                        </div>
                      </div>
                    </div>

                    <button 
                      onClick={generate}
                      disabled={isGenerating || (!selectedNiche && !customNiche && !freePrompt)}
                      className="active-neon w-full py-8 rounded-[2.5rem] font-black uppercase tracking-[0.6em] flex items-center justify-center gap-5 text-[10px] disabled:opacity-20 disabled:grayscale transition-all hover:scale-[1.02] shadow-[0_20px_40px_rgba(0,242,255,0.3)]"
                    >
                      {isGenerating ? <i className="ph-duotone ph-arrows-clockwise ph-spin text-3xl"></i> : 'FORJAR PROMPTS'}
                    </button>
                  </div>
                </section>

                {showHistory && history.length > 0 && (
                  <div className="bg-white dark:bg-panel p-8 rounded-[3rem] border-2 border-accent shadow-2xl animate-fade-in max-h-[400px] overflow-y-auto">
                    <h3 className="text-[10px] font-black uppercase tracking-[0.4em] mb-6 flex items-center gap-3">
                       <i className="ph-duotone ph-clock-counter-clockwise text-accent text-xl"></i> Memória de Voo
                    </h3>
                    <div className="flex flex-col gap-3">
                      {history.map((h, i) => (
                        <div key={i} className="p-4 bg-zinc-50 dark:bg-black/40 rounded-[1.5rem] flex justify-between items-center border border-zinc-100 dark:border-white/5 hover:border-accent/40 transition-all group">
                          <span className="text-[10px] font-black text-zinc-500 tracking-tighter uppercase">{h.date}</span>
                          <button onClick={()=>setPrompts(h.data)} className="text-accent text-[9px] font-black uppercase tracking-widest hover:underline">Abrir</button>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </main>
        </div>
      );
    }

    function LoginScreen({ isDark, toggleTheme }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true);
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert("NEGADO: SISTEMA PROTEGIDO");
        setLoading(false);
      };

      return (
        <div className="min-h-screen bg-background flex items-center justify-center p-8 relative overflow-hidden">
          <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-accent/5 rounded-full blur-[120px]"></div>
          <form onSubmit={handleLogin} className="w-full max-w-md bg-panel p-16 rounded-[4rem] border border-white/5 flex flex-col gap-10 shadow-[0_0_100px_rgba(0,0,0,1)] relative z-10">
            <div className="text-center">
              <div className="w-24 h-24 icon-box bg-accent rounded-[2.5rem] mx-auto mb-10 flex items-center justify-center shadow-[0_0_50px_rgba(0,242,255,0.4)]">
                <i className="ph-duotone ph-fingerprint text-5xl text-black"></i>
              </div>
              <h1 className="text-3xl font-black uppercase text-white italic tracking-tighter leading-none">STUDIO<span className="text-accent ml-1">PRO</span></h1>
              <p className="text-zinc-700 text-[10px] font-black uppercase tracking-[0.5em] mt-4">Authorized Area</p>
            </div>
            <div className="space-y-4">
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="IDENTIFICAÇÃO" className="cyber-input w-full p-6 rounded-2xl outline-none font-black text-white dark:text-white dark:bg-zinc-900 border-none tracking-[0.2em] text-[10px]" />
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="CHAVE DE ACESSO" className="cyber-input w-full p-6 rounded-2xl outline-none font-black text-white dark:text-white dark:bg-zinc-900 border-none tracking-[0.2em] text-[10px]" />
            </div>
            <button className="active-neon w-full py-6 rounded-3xl font-black uppercase tracking-[0.4em] text-xs hover:scale-105 transition-all">
              {loading ? 'AUTENTICANDO...' : 'ENTRAR'}
            </button>
            <div className="flex justify-center">
              <button type="button" onClick={toggleTheme} className="text-zinc-600 hover:text-accent transition-all">
                {isDark ? <i className="ph-duotone ph-sun-dim text-3xl"></i> : <i className="ph-duotone ph-moon-stars text-3xl"></i>}
              </button>
            </div>
          </form>
        </div>
      );
    }

    function App() {
      const [session, setSession] = useState(null);
      const [isDark, setIsDark] = useState(true);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        document.documentElement.classList.add('dark');
        supabase.auth.getSession().then(({ data: { session } }) => { setSession(session); setLoading(false); });
        supabase.auth.onAuthStateChange((_event, session) => setSession(session));
      }, []);

      const toggleTheme = () => {
        const newTheme = !isDark;
        setIsDark(newTheme);
        if (newTheme) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      };

      if (loading) return null;
      return session ? <MainApp onLogout={()=>supabase.auth.signOut()} isDark={isDark} toggleTheme={toggleTheme} /> : <LoginScreen isDark={isDark} toggleTheme={toggleTheme} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
