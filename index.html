    /* BOTÕES DE NICHO */
    .btn-niche {
      padding: 1rem;
      border-radius: 0.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid transparent;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html.dark .btn-niche { background: rgba(255, 255, 255, 0.03); border-color: rgba(255, 255, 255, 0.05); }
    html:not(.dark) .btn-niche { background: #FFFFFF; border-color: #E2E8F0; }

    .btn-niche:hover { transform: translateY(-2px); }
    .btn-niche.active { border-color: #006DF0; background: rgba(0, 109, 240, 0.08); color: #006DF0; }

    /* BOTÃO PRINCIPAL */
    .btn-primary {
      background: #0F172A;
      color: white;
      font-weight: 700;
      padding: 1rem;
      border-radius: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.2s ease;
      border: 2px solid transparent;
    }
    html.dark .btn-primary { background: #FFFFFF; color: #0F172A; border-color: #05F0BD; }
    .btn-primary:hover:not(:disabled) { transform: scale(1.02); filter: brightness(1.1); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    html.dark ::-webkit-scrollbar-thumb { background: #334155; }
  </style>
