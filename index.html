<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Prompt Consistency Studio Pro</title>
  
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0A0A0B" />
  <link rel="icon" type="image/png" href="icone-192.png" />
  <link rel="apple-touch-icon" href="icone-192.png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { background: '#0A0A0B' },
          fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Merriweather', 'serif'] },
          animation: { 'fade-in': 'fadeIn 0.4s ease-out' },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 20px; width: 20px;
      border-radius: 50%; background: #f97316;
      cursor: pointer; margin-top: -8px;
    }
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%; height: 4px; background: #27272a; border-radius: 2px;
    }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
  </style>
</head>
<body class="bg-zinc-50 dark:bg-background text-zinc-900 dark:text-white transition-colors duration-300 selection:bg-orange-500/30 overflow-x-hidden antialiased">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const SUPABASE_URL = "https://wvejrqpwmodgfjtxperb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Co_Sc9s65LlNw2L1a19EBw_enm2KWFp";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const GEMINI_MODELS = ["gemini-3.1-pro-preview", "gemini-3.1-flash-lite"];

    async function fetchWithRetry(payload, retries = 3) {
      const delays = [1000, 2000, 4000];
      for (let m = 0; m < GEMINI_MODELS.length; m++) {
        const currentModel = GEMINI_MODELS[m];
        for (let i = 0; i < retries; i++) {
          try {
            const { data, error } = await supabase.functions.invoke('gerar-prompt', {
              body: JSON.stringify({ model: currentModel, payload: payload })
            });
            if (error) throw error;
            return data;
          } catch (e) {
            if (i === retries - 1 && m === GEMINI_MODELS.length - 1) throw e;
            await new Promise(res => setTimeout(res, delays[i]));
          }
        }
      }
    }

    async function generatePromptsAPI({ imagePreviews, niche, customNiche, freePrompt, extraDetails, visualStyle, aspectRatio, language, settings }) {
      const targetNiche = customNiche.trim() !== '' ? customNiche : niche;
      const qty = settings?.quantity || 10;
      const arParam = "--ar " + aspectRatio.split(' ')[0];

      const systemInstruction = `ROLE: Deterministic Prompt-to-JSON Engine. Biometric Analyzer.
RULES: 
1. Extract exact body proportions (build, arms, silhouette) from image.
2. Output ONLY valid JSON array of objects.
3. IMPORTANT: You MUST append the parameter "${arParam}" at the end of every prompt string inside the JSON.`;

      // Se houver prompt manual, ele ganha prioridade, mas a IA ainda usa os parâmetros de estilo e biometria.
      let promptText = freePrompt.trim() !== '' 
        ? `Generate ${qty} variation prompts based on this manual description: "${freePrompt}". Style: ${visualStyle}. Include details: ${extraDetails}.`
        : `Generate ${qty} professional prompts for niche: ${targetNiche}. Style: ${visualStyle}. Realism: ${settings.realismLevel}. Gender: ${settings.targetGender}. Extra details: ${extraDetails}.`;

      const payload = {
        systemInstruction: { parts: [{ text: systemInstruction }] },
        contents: [{ role: "user", parts: [{ text: promptText }] }],
        generationConfig: {
          responseMimeType: "application/json",
          responseSchema: { type: "ARRAY", items: { type: "OBJECT", properties: { prompt: { type: "STRING" } }, required: ["prompt"] } }
        }
      };

      if (imagePreviews && imagePreviews.length > 0) {
        imagePreviews.forEach((preview) => {
          const base64Data = preview.split(',')[1];
          const mimeType = preview.split(';')[0].split(':')[1];
          payload.contents[0].parts.push({ inlineData: { mimeType, data: base64Data } });
        });
      }

      const data = await fetchWithRetry(payload);
      return data.map((item) => ({ prompt: item.prompt, id: crypto.randomUUID() }));
    }

    function OptionButton({ label, active, onClick }) {
      return (
        <button 
          onClick={onClick}
          className={`px-4 py-2.5 text-[10px] uppercase font-black tracking-widest rounded-xl border-2 transition-all active:scale-95 ${
            active 
            ? 'bg-orange-500 border-orange-500 text-white shadow-lg shadow-orange-500/30' 
            : 'bg-white dark:bg-zinc-900 border-zinc-200 dark:border-white/5 text-zinc-500 dark:text-zinc-400 hover:border-orange-500/40'
          }`}
        >
          {label}
        </button>
      );
    }

    const NICHES = [
      { id: 'aniversario', name: 'Aniversário', icon: '🎂' },
      { id: 'profissoes', name: 'Profissões', icon: '💼' },
      { id: 'influencer', name: 'Influencer', icon: '📱' },
      { id: 'casamento', name: 'Casamento', icon: '💍' },
      { id: 'gestante', name: 'Gestante', icon: '🤰' },
      { id: 'familia', name: 'Família', icon: '👨‍👩‍👧‍👦' },
      { id: 'musculacao', name: 'Fitness', icon: '🏋️‍♂️' },
      { id: 'moda', name: 'Moda', icon: '👗' }
    ];

    function MainApp({ onLogout, isDark, toggleTheme }) {
      const [imagePreviews, setImagePreviews] = useState([]);
      const [selectedNiche, setSelectedNiche] = useState('');
      const [customNiche, setCustomNiche] = useState('');
      const [freePrompt, setFreePrompt] = useState('');
      const [extraDetails, setExtraDetails] = useState('');
      const [prompts, setPrompts] = useState([]);
      const [isGenerating, setIsGenerating] = useState(false);
      const [history, setHistory] = useState([]);
      const [showHistory, setShowHistory] = useState(false);

      const [visualStyle, setVisualStyle] = useState('Ultra-realista');
      const [aspectRatio, setAspectRatio] = useState('9:16 Vertical');
      const [language, setLanguage] = useState('Inglês');
      const [settings, setSettings] = useState({
        quantity: 10, realismLevel: 'natural', creativeIntensity: 'média',
        keepClothes: false, keepBackground: false, targetGender: 'auto'
      });

      const handleImageUpload = (e) => {
        const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
        files.forEach(file => {
          const reader = new FileReader();
          reader.onloadend = () => setImagePreviews(prev => [...prev, reader.result]);
          reader.readAsDataURL(file);
        });
      };

      const generate = async () => {
        setIsGenerating(true);
        try {
          const result = await generatePromptsAPI({
            imagePreviews, niche: selectedNiche, customNiche, freePrompt, extraDetails,
            visualStyle, aspectRatio, language, settings
          });
          setPrompts(result);
          setHistory(prev => [{ date: new Date().toLocaleTimeString(), data: result }, ...prev]);
        } catch (e) { alert("Erro: " + e.message); }
        finally { setIsGenerating(false); }
      };

      return (
        <div className="min-h-screen flex flex-col transition-all duration-500">
          <header className="sticky top-0 z-50 bg-white/70 dark:bg-black/70 backdrop-blur-2xl border-b border-zinc-200 dark:border-white/5 px-8 py-5 flex items-center justify-between">
            <div className="flex items-center gap-4">
               <div className="w-12 h-12 rounded-2xl bg-gradient-to-br from-orange-600 to-orange-400 flex items-center justify-center shadow-xl shadow-orange-500/20">
                  <i className="ph ph-lightning text-3xl text-white"></i>
               </div>
               <div>
                  <h1 className="text-xl font-black uppercase tracking-tighter italic leading-none">Studio Pro</h1>
                  <span className="text-[9px] font-bold text-zinc-500 uppercase tracking-[0.3em]">AI Consistency Engine</span>
               </div>
            </div>
            <div className="flex items-center gap-3">
              <button onClick={() => setShowHistory(!showHistory)} className="px-5 py-3 rounded-2xl border border-zinc-200 dark:border-white/5 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all flex items-center gap-3">
                <i className="ph ph-clock-counter-clockwise text-xl"></i>
                <span className="text-xs font-black uppercase hidden md:inline tracking-widest">Arquivo</span>
              </button>
              <button onClick={toggleTheme} className="p-3 rounded-2xl border border-zinc-200 dark:border-white/5 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all text-orange-500">
                {isDark ? <i className="ph ph-sun-dim-fill text-2xl"></i> : <i className="ph ph-moon-stars-fill text-2xl"></i>}
              </button>
              <button onClick={onLogout} className="p-3 rounded-2xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-all">
                <i className="ph ph-power text-2xl"></i>
              </button>
            </div>
          </header>

          <main className="max-w-[1500px] mx-auto w-full p-8 grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <div className="lg:col-span-8 flex flex-col gap-10">
              
              {/* PASSO 1: FOTO */}
              <section className="bg-white dark:bg-zinc-900/40 p-10 rounded-[2.5rem] border border-zinc-200 dark:border-white/5 shadow-sm transition-all hover:shadow-xl hover:shadow-orange-500/5">
                <div className="flex items-center gap-4 mb-8">
                  <span className="w-10 h-10 rounded-2xl bg-orange-500 text-white flex items-center justify-center font-black text-lg italic shadow-lg shadow-orange-500/30">01</span>
                  <h2 className="text-xs font-black uppercase tracking-[0.2em] text-zinc-400">Scanner Biométrico de Referência</h2>
                </div>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-5">
                  {imagePreviews.map((src, i) => (
                    <div key={i} className="relative aspect-square rounded-[1.5rem] overflow-hidden border-4 border-orange-500 shadow-2xl">
                      <img src={src} className="w-full h-full object-cover" />
                      <button onClick={()=>setImagePreviews(prev=>prev.filter((_,idx)=>idx!==i))} className="absolute top-3 right-3 w-8 h-8 bg-black/70 text-white rounded-xl backdrop-blur-md flex items-center justify-center hover:bg-red-500 transition-colors"><i className="ph ph-trash"></i></button>
                    </div>
                  ))}
                  <label className="aspect-square rounded-[1.5rem] border-4 border-dashed border-zinc-200 dark:border-white/5 flex flex-col items-center justify-center cursor-pointer hover:border-orange-500 hover:bg-orange-500/5 transition-all group">
                    <i className="ph ph-user-focus text-4xl text-zinc-300 group-hover:text-orange-500 transition-colors"></i>
                    <span className="text-[9px] font-black uppercase mt-3 text-zinc-400">Adicionar Face</span>
                    <input type="file" className="hidden" onChange={handleImageUpload} />
                  </label>
                </div>
              </section>

              {/* PASSO 2: NICHO OU MANUAL */}
              <section className="bg-white dark:bg-zinc-900/40 p-10 rounded-[2.5rem] border border-zinc-200 dark:border-white/5 shadow-sm">
                <div className="flex items-center gap-4 mb-8">
                  <span className="w-10 h-10 rounded-2xl bg-orange-500 text-white flex items-center justify-center font-black text-lg italic shadow-lg shadow-orange-500/30">02</span>
                  <h2 className="text-xs font-black uppercase tracking-[0.2em] text-zinc-400">Contexto e Criatividade</h2>
                </div>
                
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                  {NICHES.map(n => (
                    <button key={n.id} onClick={()=>{setSelectedNiche(n.id); setFreePrompt('');}} className={`p-5 rounded-2xl border-2 transition-all flex flex-col items-center gap-3 ${selectedNiche === n.id ? 'border-orange-500 bg-orange-500/10 scale-105 shadow-lg' : 'border-zinc-100 dark:border-white/5 hover:border-orange-500/30'}`}>
                      <span className="text-3xl">{n.icon}</span>
                      <span className="text-[10px] font-black uppercase tracking-widest">{n.name}</span>
                    </button>
                  ))}
                </div>

                <div className="space-y-6">
                  <div>
                    <label className="text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-3 block">Modo Alternativo: Prompt Livre (Manual)</label>
                    <textarea 
                      value={freePrompt}
                      onChange={e=>{setFreePrompt(e.target.value); setSelectedNiche('');}}
                      placeholder="Descreva a cena livremente aqui... Se escrever aqui, o nicho acima será ignorado."
                      className="w-full bg-zinc-100 dark:bg-zinc-800/50 border-2 border-transparent focus:border-orange-500 rounded-[1.5rem] p-6 text-sm h-32 outline-none transition-all resize-none font-medium custom-scrollbar"
                    />
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                      <label className="text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-3 block">Nicho Personalizado</label>
                      <input type="text" value={customNiche} onChange={e=>setCustomNiche(e.target.value)} placeholder="Ex: Odontopediatra" className="w-full bg-zinc-100 dark:bg-zinc-800/50 border-2 border-transparent focus:border-orange-500 rounded-2xl p-4 text-sm outline-none transition-all" />
                    </div>
                    <div>
                      <label className="text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-3 block">Detalhes da Cena</label>
                      <input type="text" value={extraDetails} onChange={e=>setExtraDetails(e.target.value)} placeholder="Ex: Balões, luz de neon..." className="w-full bg-zinc-100 dark:bg-zinc-800/50 border-2 border-transparent focus:border-orange-500 rounded-2xl p-4 text-sm outline-none transition-all" />
                    </div>
                  </div>
                </div>
              </section>

              {/* RESULTADOS */}
              {prompts.length > 0 && (
                <section className="animate-fade-in flex flex-col gap-6 mb-12">
                  <div className="flex items-center justify-between px-4">
                    <h2 className="text-2xl font-black uppercase italic tracking-tighter">Prompts Gerados</h2>
                    <button onClick={()=>{
                      const text = prompts.map((p,i)=>`Prompt ${i+1}:\n${p.prompt}`).join('\n\n');
                      navigator.clipboard.writeText(text);
                    }} className="px-8 py-4 bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] flex items-center gap-3 shadow-xl hover:scale-105 transition-all active:scale-95">
                      <i className="ph ph-copy-simple text-xl"></i> Copiar Sequência Completa
                    </button>
                  </div>
                  <div className="flex flex-col gap-4">
                    {prompts.map((p, i) => (
                      <div key={p.id} className="bg-white dark:bg-zinc-900/60 p-8 rounded-[2rem] border border-zinc-200 dark:border-white/5 backdrop-blur-sm group hover:border-orange-500/50 transition-all">
                        <div className="flex justify-between items-center mb-5">
                          <div className="flex items-center gap-3">
                            <span className="w-8 h-8 rounded-lg bg-zinc-100 dark:bg-zinc-800 flex items-center justify-center font-black text-xs text-orange-500 italic">{i+1}</span>
                            <span className="text-[10px] font-black uppercase text-zinc-500 tracking-[0.3em]">Código do Prompt</span>
                          </div>
                          <button onClick={()=>navigator.clipboard.writeText(p.prompt)} className="w-10 h-10 rounded-xl bg-orange-500/10 text-orange-500 flex items-center justify-center hover:bg-orange-500 hover:text-white transition-all"><i className="ph ph-copy text-xl"></i></button>
                        </div>
                        <p className="text-xs font-mono text-zinc-600 dark:text-zinc-300 leading-loose break-words bg-zinc-50 dark:bg-black/30 p-6 rounded-2xl border border-dashed border-zinc-200 dark:border-white/5">{p.prompt}</p>
                      </div>
                    ))}
                  </div>
                </section>
              )}
            </div>

            {/* COLUNA DIREITA: AJUSTES PRO */}
            <div className="lg:col-span-4">
              <div className="sticky top-32 flex flex-col gap-8">
                
                <section className="bg-white dark:bg-zinc-900 p-10 rounded-[3rem] border border-zinc-200 dark:border-white/5 shadow-2xl relative overflow-hidden">
                  <div className="flex items-center gap-4 mb-10">
                    <span className="w-10 h-10 rounded-2xl bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 flex items-center justify-center font-black text-lg italic shadow-xl">03</span>
                    <h2 className="text-xs font-black uppercase tracking-[0.2em] text-zinc-500">Controles de Elite</h2>
                  </div>

                  <div className="flex flex-col gap-10">
                    <div>
                      <div className="flex justify-between mb-5">
                        <label className="text-[10px] font-black uppercase tracking-widest text-zinc-400">Volume</label>
                        <span className="text-sm font-black text-orange-500 italic">{settings.quantity} Unidades</span>
                      </div>
                      <input 
                        type="range" min="1" max="20" 
                        value={settings.quantity}
                        onChange={e=>setSettings({...settings, quantity: e.target.value})}
                        className="w-full accent-orange-500 bg-zinc-200 dark:bg-zinc-800 h-1.5 rounded-full appearance-none cursor-pointer"
                      />
                    </div>

                    <div>
                      <label className="text-[10px] font-black uppercase tracking-widest text-zinc-400 block mb-4">Estilo Visual</label>
                      <div className="grid grid-cols-2 gap-2">
                        {['Ultra-realista', 'Luxo Premium', 'Estúdio', 'Cinematográfico'].map(s => (
                          <OptionButton key={s} label={s} active={visualStyle === s} onClick={()=>setVisualStyle(s)} />
                        ))}
                      </div>
                    </div>

                    <div>
                      <label className="text-[10px] font-black uppercase tracking-widest text-zinc-400 block mb-4">Realismo</label>
                      <div className="grid grid-cols-3 gap-2">
                        {['natural', 'premium', 'cine'].map(r => (
                          <OptionButton key={r} label={r} active={settings.realismLevel === r} onClick={()=>setSettings({...settings, realismLevel: r})} />
                        ))}
                      </div>
                    </div>

                    <div>
                      <label className="text-[10px] font-black uppercase tracking-widest text-zinc-400 block mb-4">Proporção (Aspect Ratio)</label>
                      <div className="grid grid-cols-2 gap-2">
                        {['9:16 Vertical', '16:9 Horizontal', '1:1 Quadrado', '4:5 Feed'].map(a => (
                          <OptionButton key={a} label={a} active={aspectRatio === a} onClick={()=>setAspectRatio(a)} />
                        ))}
                      </div>
                    </div>

                    <div>
                      <label className="text-[10px] font-black uppercase tracking-widest text-zinc-400 block mb-4">Perfil Demográfico</label>
                      <div className="grid grid-cols-2 gap-2">
                        {['auto', 'feminino', 'masculino', 'criança'].map(g => (
                          <OptionButton key={g} label={g} active={settings.targetGender === g} onClick={()=>setSettings({...settings, targetGender: g})} />
                        ))}
                      </div>
                    </div>

                    {imagePreviews.length > 0 && (
                      <div className="pt-6 border-t border-zinc-100 dark:border-white/5 flex flex-col gap-3">
                        <Toggle label="Preservar Roupa Original" checked={settings.keepClothes} onChange={(v)=>setSettings({...settings, keepClothes: v})} />
                        <Toggle label="Preservar Fundo Original" checked={settings.keepBackground} onChange={(v)=>setSettings({...settings, keepBackground: v})} />
                      </div>
                    )}

                    <button 
                      onClick={generate}
                      disabled={isGenerating || (!selectedNiche && !customNiche && !freePrompt)}
                      className="w-full py-6 bg-gradient-to-r from-orange-600 to-orange-400 hover:from-orange-500 hover:to-orange-300 text-white rounded-[1.5rem] font-black uppercase tracking-[0.3em] shadow-2xl shadow-orange-500/40 disabled:opacity-30 disabled:grayscale transition-all active:scale-95 flex items-center justify-center gap-4 text-sm"
                    >
                      {isGenerating ? (
                        <><i className="ph ph-spinner-gap ph-spin text-2xl"></i> Processando...</>
                      ) : (
                        <><i className="ph ph-magic-wand-fill text-2xl"></i> Forjar Prompts</>
                      )}
                    </button>
                  </div>
                </section>

                {showHistory && history.length > 0 && (
                  <div className="bg-white dark:bg-zinc-900 p-8 rounded-[2.5rem] border-4 border-orange-500 animate-fade-in shadow-2xl max-h-[400px] overflow-y-auto custom-scrollbar">
                    <h3 className="text-[10px] font-black uppercase tracking-widest mb-6 flex items-center gap-3">
                      <i className="ph ph-clock-counter-clockwise-bold text-orange-500"></i> Memória de Geração
                    </h3>
                    <div className="flex flex-col gap-3">
                      {history.map((h, i) => (
                        <div key={i} className="p-4 bg-zinc-50 dark:bg-zinc-800/50 rounded-2xl flex justify-between items-center transition-all hover:bg-zinc-100 dark:hover:bg-zinc-800 border border-transparent hover:border-orange-500/20">
                          <div className="flex flex-col">
                            <span className="text-[10px] font-black text-zinc-400 uppercase">Sessão</span>
                            <span className="text-xs font-bold italic">{h.date}</span>
                          </div>
                          <button onClick={()=>setPrompts(h.data)} className="px-4 py-2 bg-orange-500 text-white rounded-xl text-[9px] font-black uppercase tracking-widest">Abrir</button>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

              </div>
            </div>
          </main>
        </div>
      );
    }

    function LoginScreen({ isDark, toggleTheme }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true);
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert("Credenciais Inválidas");
        setLoading(false);
      };

      return (
        <div className="min-h-screen bg-zinc-50 dark:bg-background flex items-center justify-center p-6">
          <form onSubmit={handleLogin} className="w-full max-w-md bg-white dark:bg-zinc-900 p-12 rounded-[3rem] shadow-2xl border border-zinc-200 dark:border-white/5 flex flex-col gap-8 relative overflow-hidden transition-all">
            <div className="absolute top-0 right-0 p-8 opacity-5">
               <i className="ph ph-shield-check text-9xl"></i>
            </div>
            <div className="text-center">
              <div className="w-20 h-20 bg-orange-500 rounded-[2rem] mx-auto mb-8 flex items-center justify-center shadow-2xl shadow-orange-500/40">
                <i className="ph ph-fingerprint text-4xl text-white"></i>
              </div>
              <h1 className="text-3xl font-black uppercase italic tracking-tighter leading-none">Acesso Pro</h1>
              <p className="text-zinc-500 text-[10px] mt-3 font-black uppercase tracking-[0.4em]">Consistency Studio</p>
            </div>
            <div className="space-y-4">
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="Seu e-mail da Kiwify" className="w-full bg-zinc-100 dark:bg-zinc-800 border-2 border-transparent focus:border-orange-500 p-5 rounded-2xl outline-none transition-all font-bold text-sm" />
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Senha mestre" className="w-full bg-zinc-100 dark:bg-zinc-800 border-2 border-transparent focus:border-orange-500 p-5 rounded-2xl outline-none transition-all font-bold text-sm" />
            </div>
            <button className="w-full py-5 bg-orange-500 text-white rounded-2xl font-black uppercase tracking-[0.2em] hover:bg-orange-600 transition-all shadow-xl shadow-orange-500/20 active:scale-95">
              {loading ? 'Sincronizando...' : 'Entrar no Sistema'}
            </button>
            <div className="flex items-center justify-center gap-3">
               <button type="button" onClick={toggleTheme} className="text-zinc-400 hover:text-orange-500 transition-colors">
                  {isDark ? <i className="ph ph-sun-dim text-2xl"></i> : <i className="ph ph-moon-stars text-2xl"></i>}
               </button>
            </div>
          </form>
        </div>
      );
    }

    function App() {
      const [session, setSession] = useState(null);
      const [isDark, setIsDark] = useState(true);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        // Forçar Modo Dark no Início
        document.documentElement.classList.add('dark');
        
        supabase.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          setLoading(false);
        });
        supabase.auth.onAuthStateChange((_event, session) => setSession(session));
      }, []);

      const toggleTheme = () => {
        setIsDark(!isDark);
        document.documentElement.classList.toggle('dark');
      };

      if (loading) return null;
      return session ? <MainApp onLogout={()=>supabase.auth.signOut()} isDark={isDark} toggleTheme={toggleTheme} /> : <LoginScreen isDark={isDark} toggleTheme={toggleTheme} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
