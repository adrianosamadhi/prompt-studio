<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Prompt Consistency Studio Pro</title>
  
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#000000" />
  <link rel="icon" type="image/png" href="icone-192.png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { 
            background: '#000000',
            panel: '#0a0a0c',
            accent: '#00f2ff', // Azul Neon
            accentDark: '#0066ff'
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          animation: { 'pulse-slow': 'pulse 3s infinite' }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    /* Efeito Black Piano / Glossy nos botões */
    .btn-glossy {
      background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 100%);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255,255,255,0.1);
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
    
    .active-neon {
      background: linear-gradient(180deg, #00f2ff 0%, #0066ff 100%);
      box-shadow: 0 0 20px rgba(0, 242, 255, 0.4), inset 0 1px 2px rgba(255,255,255,0.5);
      border-color: #00f2ff !important;
    }

    /* Scrollbar Gamer */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #1e1e22; border-radius: 10px; border: 2px solid #000; }
    ::-webkit-scrollbar-thumb:hover { background: #00f2ff; }

    /* Inputs estilo Cyber */
    .cyber-input {
      background: #0d0d11;
      border: 1px solid #1e1e22;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
    }
    .cyber-input:focus {
      border-color: #00f2ff;
      box-shadow: 0 0 10px rgba(0, 242, 255, 0.2), inset 0 2px 4px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body class="bg-background text-zinc-100 selection:bg-accent/30 overflow-x-hidden antialiased">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const SUPABASE_URL = "https://wvejrqpwmodgfjtxperb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Co_Sc9s65LlNw2L1a19EBw_enm2KWFp";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const GEMINI_MODELS = ["gemini-3.1-pro-preview", "gemini-3.1-flash-lite"];

    async function fetchWithRetry(payload, retries = 3) {
      for (let m = 0; m < GEMINI_MODELS.length; m++) {
        const currentModel = GEMINI_MODELS[m];
        for (let i = 0; i < retries; i++) {
          try {
            const { data, error } = await supabase.functions.invoke('gerar-prompt', {
              body: JSON.stringify({ model: currentModel, payload: payload })
            });
            if (error) throw error;
            return data;
          } catch (e) {
            if (i === retries - 1 && m === GEMINI_MODELS.length - 1) throw e;
            await new Promise(res => setTimeout(res, 1000));
          }
        }
      }
    }

    async function generatePromptsAPI({ imagePreviews, niche, customNiche, freePrompt, extraDetails, visualStyle, aspectRatio, settings }) {
      const targetNiche = customNiche.trim() !== '' ? customNiche : niche;
      const qty = settings?.quantity || 10;
      const arParam = "--ar " + aspectRatio.split(' ')[0];

      const systemInstruction = `ROLE: Deterministic Prompt-to-JSON Engine. Append "${arParam}" at the end of every prompt.`;
      let promptText = freePrompt.trim() !== '' 
        ? `Generate ${qty} variations: "${freePrompt}". Style: ${visualStyle}.`
        : `Generate ${qty} for ${targetNiche}. Style: ${visualStyle}. Realism: ${settings.realismLevel}.`;

      const payload = {
        systemInstruction: { parts: [{ text: systemInstruction }] },
        contents: [{ role: "user", parts: [{ text: promptText }] }],
        generationConfig: { responseMimeType: "application/json" }
      };

      if (imagePreviews.length > 0) {
        imagePreviews.forEach((preview) => {
          const base64Data = preview.split(',')[1];
          const mimeType = preview.split(';')[0].split(':')[1];
          payload.contents[0].parts.push({ inlineData: { mimeType, data: base64Data } });
        });
      }

      const data = await fetchWithRetry(payload);
      const textResult = data.candidates?.[0]?.content?.parts?.[0]?.text || "[]";
      return JSON.parse(textResult).map(item => ({ prompt: item.prompt, id: crypto.randomUUID() }));
    }

    // --- BOTOES MODERNOS (MODO GAME) ---
    function OptionButton({ label, active, onClick }) {
      return (
        <button 
          onClick={onClick}
          className={`btn-glossy px-4 py-3 text-[10px] font-black uppercase tracking-[0.15em] rounded-xl border border-white/5 transition-all duration-300 transform active:scale-95 ${
            active ? 'active-neon text-black' : 'bg-[#16161a] text-zinc-400 hover:text-white hover:border-white/20'
          }`}
        >
          {label}
        </button>
      );
    }

    const NICHES = [
      { id: 'aniversario', name: 'Aniversário', icon: '🎂' },
      { id: 'profissoes', name: 'Profissões', icon: '💼' },
      { id: 'influencer', name: 'Influencer', icon: '📱' },
      { id: 'casamento', name: 'Casamento', icon: '💍' },
      { id: 'gestante', name: 'Gestante', icon: '🤰' },
      { id: 'familia', name: 'Família', icon: '👨‍👩‍👧‍👦' },
      { id: 'musculacao', name: 'Fitness', icon: '🏋️‍♂️' },
      { id: 'moda', name: 'Moda', icon: '👗' }
    ];

    function MainApp({ onLogout }) {
      const [imagePreviews, setImagePreviews] = useState([]);
      const [selectedNiche, setSelectedNiche] = useState('');
      const [customNiche, setCustomNiche] = useState('');
      const [freePrompt, setFreePrompt] = useState('');
      const [extraDetails, setExtraDetails] = useState('');
      const [prompts, setPrompts] = useState([]);
      const [isGenerating, setIsGenerating] = useState(false);
      const [history, setHistory] = useState([]);
      const [showHistory, setShowHistory] = useState(false);

      const [visualStyle, setVisualStyle] = useState('Ultra-realista');
      const [aspectRatio, setAspectRatio] = useState('9:16 Vertical');
      const [settings, setSettings] = useState({
        quantity: 10, realismLevel: 'natural', targetGender: 'auto'
      });

      const generate = async () => {
        setIsGenerating(true);
        try {
          const result = await generatePromptsAPI({
            imagePreviews, niche: selectedNiche, customNiche, freePrompt, extraDetails,
            visualStyle, aspectRatio, settings
          });
          setPrompts(result);
          setHistory(prev => [{ date: new Date().toLocaleTimeString(), data: result }, ...prev]);
        } catch (e) { console.error(e); }
        finally { setIsGenerating(false); }
      };

      return (
        <div className="min-h-screen flex flex-col">
          <header className="sticky top-0 z-50 bg-black/60 backdrop-blur-xl border-b border-white/5 px-8 py-4 flex items-center justify-between shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
            <div className="flex items-center gap-4">
               <div className="w-10 h-10 rounded-xl bg-accent flex items-center justify-center shadow-[0_0_15px_rgba(0,242,255,0.4)]">
                  <i className="ph-fill ph-aperture text-2xl text-black"></i>
               </div>
               <h1 className="text-xl font-black uppercase italic tracking-tighter text-white">Studio<span className="text-accent">Pro</span></h1>
            </div>
            <div className="flex items-center gap-4">
              <button onClick={() => setShowHistory(!showHistory)} className="btn-glossy px-4 py-2 rounded-xl bg-[#16161a] border border-white/5 text-xs font-black uppercase tracking-widest text-zinc-400 hover:text-accent transition-all">
                Histórico
              </button>
              <button onClick={onLogout} className="w-10 h-10 rounded-xl bg-red-600/10 text-red-500 hover:bg-red-600 hover:text-white transition-all flex items-center justify-center">
                <i className="ph ph-power-bold text-xl"></i>
              </button>
            </div>
          </header>

          <main className="max-w-[1440px] mx-auto w-full p-8 grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <div className="lg:col-span-8 flex flex-col gap-8">
              
              {/* PASSO 1 */}
              <section className="bg-panel p-8 rounded-[2rem] border border-white/5 shadow-2xl">
                <div className="flex items-center gap-4 mb-8">
                  <span className="w-8 h-8 rounded-lg bg-accent text-black flex items-center justify-center font-black text-sm italic">01</span>
                  <h2 className="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-500">Scan de Identidade</h2>
                </div>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                  {imagePreviews.map((src, i) => (
                    <div key={i} className="relative aspect-square rounded-2xl overflow-hidden border-2 border-accent shadow-[0_0_15px_rgba(0,242,255,0.2)]">
                      <img src={src} className="w-full h-full object-cover" />
                      <button onClick={()=>setImagePreviews(prev=>prev.filter((_,idx)=>idx!==i))} className="absolute top-2 right-2 w-6 h-6 bg-red-600 text-white rounded-lg flex items-center justify-center shadow-lg"><i className="ph ph-x-bold"></i></button>
                    </div>
                  ))}
                  <label className="aspect-square rounded-2xl border-2 border-dashed border-white/10 flex flex-col items-center justify-center cursor-pointer hover:bg-accent/5 hover:border-accent transition-all group">
                    <i className="ph ph-plus-bold text-2xl text-zinc-600 group-hover:text-accent"></i>
                    <input type="file" className="hidden" onChange={(e)=>{
                       const file = e.target.files[0];
                       if(file){
                         const r = new FileReader();
                         r.onload = (ev)=>setImagePreviews(prev=>[...prev, ev.target.result]);
                         r.readAsDataURL(file);
                       }
                    }} />
                  </label>
                </div>
              </section>

              {/* PASSO 2 */}
              <section className="bg-panel p-8 rounded-[2rem] border border-white/5 shadow-2xl">
                <div className="flex items-center gap-4 mb-8">
                  <span className="w-8 h-8 rounded-lg bg-accent text-black flex items-center justify-center font-black text-sm italic">02</span>
                  <h2 className="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-500">Configuração de Missão</h2>
                </div>
                
                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
                  {NICHES.map(n => (
                    <button key={n.id} onClick={()=>{setSelectedNiche(n.id); setFreePrompt('');}} className={`btn-glossy p-4 rounded-2xl border transition-all flex flex-col items-center gap-2 ${selectedNiche === n.id ? 'active-neon text-black' : 'bg-[#16161a] border-white/5 text-zinc-500'}`}>
                      <span className="text-2xl">{n.icon}</span>
                      <span className="text-[9px] font-black uppercase tracking-widest">{n.name}</span>
                    </button>
                  ))}
                </div>

                <div className="space-y-6">
                  <textarea 
                    value={freePrompt}
                    onChange={e=>{setFreePrompt(e.target.value); setSelectedNiche('');}}
                    placeholder="ESCREVA O PROMPT MANUAL AQUI..."
                    className="cyber-input w-full rounded-2xl p-6 text-sm h-32 outline-none transition-all resize-none font-bold text-white placeholder:text-zinc-700"
                  />
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" value={customNiche} onChange={e=>setCustomNiche(e.target.value)} placeholder="NICHO CUSTOM" className="cyber-input rounded-xl p-4 text-xs font-bold outline-none text-accent" />
                    <input type="text" value={extraDetails} onChange={e=>setExtraDetails(e.target.value)} placeholder="DETALHES DA CENA" className="cyber-input rounded-xl p-4 text-xs font-bold outline-none text-zinc-300" />
                  </div>
                </div>
              </section>

              {/* RESULTADOS */}
              {prompts.length > 0 && (
                <div className="flex flex-col gap-4 animate-fade-in">
                  <button onClick={()=>{
                      const text = prompts.map((p,i)=>`Prompt ${i+1}:\n${p.prompt}`).join('\n\n');
                      navigator.clipboard.writeText(text);
                    }} className="active-neon w-full py-4 rounded-2xl text-black font-black uppercase tracking-widest text-xs">
                    Copiar Todos na Ordem
                  </button>
                  {prompts.map((p, i) => (
                    <div key={p.id} className="bg-panel p-6 rounded-2xl border border-white/5 relative group">
                      <span className="text-[9px] font-black text-accent uppercase mb-2 block tracking-widest">Codex #{i+1}</span>
                      <p className="text-[11px] font-mono text-zinc-300 leading-relaxed break-words">{p.prompt}</p>
                      <button onClick={()=>navigator.clipboard.writeText(p.prompt)} className="absolute top-4 right-4 text-zinc-600 hover:text-accent"><i className="ph ph-copy-simple-bold text-xl"></i></button>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* COLUNA DIREITA */}
            <div className="lg:col-span-4">
              <div className="sticky top-28 flex flex-col gap-6">
                <section className="bg-panel p-8 rounded-[2.5rem] border border-white/5 shadow-2xl relative overflow-hidden">
                  <div className="flex items-center gap-4 mb-8">
                    <span className="w-8 h-8 rounded-lg bg-white text-black flex items-center justify-center font-black text-sm italic shadow-lg">03</span>
                    <h2 className="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-500">Ajustes Pro</h2>
                  </div>

                  <div className="flex flex-col gap-8">
                    <div>
                      <div className="flex justify-between mb-4">
                        <label className="text-[9px] font-black uppercase tracking-widest text-zinc-500">Volume</label>
                        <span className="text-xs font-black text-accent">{settings.quantity}X</span>
                      </div>
                      <input type="range" min="1" max="20" value={settings.quantity} onChange={e=>setSettings({...settings, quantity: e.target.value})} className="w-full accent-accent bg-black h-1 rounded-full appearance-none cursor-pointer" />
                    </div>

                    <div className="space-y-6">
                      <div>
                        <label className="text-[9px] font-black uppercase tracking-widest text-zinc-500 block mb-3">Estilo Visual</label>
                        <div className="grid grid-cols-2 gap-2">
                          {['Ultra-realista', 'Luxo Premium', 'Estúdio', 'Cinematográfico'].map(s => (
                            <OptionButton key={s} label={s} active={visualStyle === s} onClick={()=>setVisualStyle(s)} />
                          ))}
                        </div>
                      </div>

                      <div>
                        <label className="text-[9px] font-black uppercase tracking-widest text-zinc-500 block mb-3">Realismo</label>
                        <div className="grid grid-cols-3 gap-2">
                          {['natural', 'premium', 'cine'].map(r => (
                            <OptionButton key={r} label={r} active={settings.realismLevel === r} onClick={()=>setSettings({...settings, realismLevel: r})} />
                          ))}
                        </div>
                      </div>

                      <div>
                        <label className="text-[9px] font-black uppercase tracking-widest text-zinc-500 block mb-3">Proporção</label>
                        <div className="grid grid-cols-2 gap-2">
                          {['9:16 Vertical', '16:9 Horizontal', '1:1 Quadrado'].map(a => (
                            <OptionButton key={a} label={a} active={aspectRatio === a} onClick={()=>setAspectRatio(a)} />
                          ))}
                        </div>
                      </div>
                    </div>

                    <button 
                      onClick={generate}
                      disabled={isGenerating || (!selectedNiche && !customNiche && !freePrompt)}
                      className="active-neon w-full py-6 rounded-[1.5rem] font-black text-black uppercase tracking-[0.3em] flex items-center justify-center gap-4 text-sm disabled:opacity-20 disabled:grayscale"
                    >
                      {isGenerating ? <i className="ph ph-spinner-gap ph-spin text-2xl"></i> : 'FORJAR PROMPTS'}
                    </button>
                  </div>
                </section>

                {showHistory && (
                  <div className="bg-panel p-6 rounded-[2rem] border-2 border-accent animate-fade-in max-h-[300px] overflow-y-auto">
                    <h3 className="text-[10px] font-black uppercase tracking-widest mb-4 text-white">Memória</h3>
                    <div className="flex flex-col gap-2">
                      {history.map((h, i) => (
                        <div key={i} className="p-3 bg-black/40 rounded-xl flex justify-between items-center border border-white/5">
                          <span className="text-[10px] font-bold text-zinc-500">{h.date}</span>
                          <button onClick={()=>setPrompts(h.data)} className="text-accent text-[9px] font-black uppercase">Carregar</button>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </main>
        </div>
      );
    }

    function LoginScreen() {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true);
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert("NEGADO");
        setLoading(false);
      };

      return (
        <div className="min-h-screen bg-background flex items-center justify-center p-6">
          <form onSubmit={handleLogin} className="w-full max-w-md bg-panel p-12 rounded-[3rem] border border-white/5 flex flex-col gap-8 shadow-[0_0_50px_rgba(0,0,0,1)]">
            <div className="text-center">
              <div className="w-20 h-20 bg-accent rounded-[2rem] mx-auto mb-6 flex items-center justify-center shadow-[0_0_30px_rgba(0,242,255,0.3)]">
                <i className="ph-fill ph-fingerprint text-4xl text-black"></i>
              </div>
              <h1 className="text-2xl font-black uppercase text-white italic tracking-tighter">STUDIO<span className="text-accent">PRO</span></h1>
              <p className="text-zinc-600 text-[9px] font-black uppercase tracking-[0.4em] mt-2">Authorized Personnel Only</p>
            </div>
            <div className="space-y-4">
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="USUÁRIO" className="cyber-input w-full p-5 rounded-2xl outline-none font-bold text-white placeholder:text-zinc-800" />
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="SENHA" className="cyber-input w-full p-5 rounded-2xl outline-none font-bold text-white placeholder:text-zinc-800" />
            </div>
            <button className="active-neon w-full py-5 rounded-2xl font-black text-black uppercase tracking-[0.3em]">
              {loading ? 'SINCRONIZANDO...' : 'ENTRAR'}
            </button>
          </form>
        </div>
      );
    }

    function App() {
      const [session, setSession] = useState(null);
      const [loading, setLoading] = useState(true);
      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => { setSession(session); setLoading(false); });
        supabase.auth.onAuthStateChange((_event, session) => setSession(session));
      }, []);
      if (loading) return null;
      return session ? <MainApp onLogout={()=>supabase.auth.signOut()} /> : <LoginScreen />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
