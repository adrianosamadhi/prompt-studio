<!DOCTYPE html>
<html lang="pt-PT" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Studio Pro - Engineered by Adriano</title>
  
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#10111B" />
  <link rel="icon" type="image/png" href="icone-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200..800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { 
            panelDark: '#10111B',
            cinzaGPT: '#343540',
            cinzaC1: '#C1C1C3',
            fundoLight: '#F4F4F4',
            greenSolid: '#05F0BD', 
            blueSolid: '#006DF0'
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    /* COMPACTAÇÃO DE TELA GERAL */
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      transition: background 0.5s ease;
      min-height: 100vh;
      font-size: 12px; /* Fonte base reduzida para compactação */
    }

    html.dark body {
      background-color: #10111B;
      background-image: 
        radial-gradient(circle at 15% 20%, rgba(5, 240, 189, 0.05) 0%, transparent 30%),
        radial-gradient(circle at 85% 75%, rgba(5, 240, 189, 0.05) 0%, transparent 30%),
        radial-gradient(circle at center, #343540 0%, #10111B 90%);
      background-attachment: fixed;
    }

    html:not(.dark) body {
      background-color: #F4F4F4;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(5, 240, 189, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(5, 240, 189, 0.1) 0%, transparent 40%);
    }

    /* PAINÉIS COMPACTOS */
    .neon-panel {
      border: 1px solid rgba(5, 240, 189, 0.15);
      backdrop-filter: blur(10px);
      padding: 1.25rem; /* Margens internas reduzidas drásticamente */
      border-radius: 1.25rem;
    }

    html.dark .neon-panel { background-color: rgba(16, 17, 27, 0.7); }
    
    html:not(.dark) .neon-panel {
      background-color: #C1C1C3 !important; 
      border: 2px solid #343540 !important; 
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2) !important; 
    }

    html:not(.dark) h1, html:not(.dark) h2, html:not(.dark) label, html:not(.dark) p { color: #18181B !important; }

    /* BOTÃO GERAR PROMPTS (Fixo Branco com Borda Verde) */
    .btn-forjar {
      background-color: #FFFFFF !important;
      color: #343540 !important;
      border: 2px solid #05F0BD !important;
      box-shadow: 0 5px 15px rgba(5, 240, 189, 0.2);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.85rem;
      border-radius: 1rem;
      transition: all 0.2s ease;
      width: 100%;
    }
    .btn-forjar:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(5, 240, 189, 0.4); }

    /* CARTÕES DE MISSÃO (Fixo Azul, Hover Verde) */
    .btn-niche {
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid #52525B;
      padding: 0.75rem;
      border-radius: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      transition: all 0.2s ease;
    }
    .btn-niche i { color: #05F0BD !important; font-size: 1.5rem; }
    .btn-niche:hover { border-color: #05F0BD !important; color: #05F0BD !important; transform: scale(1.03); }
    .active-niche { border-color: #006DF0 !important; color: #006DF0 !important; background-color: rgba(0, 109, 240, 0.05); }

    /* BOTÕES TÉCNICOS Hardware Pro (Fixo Verde, Hover Azul) */
    .btn-tech {
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid #52525B;
      padding: 0.5rem;
      border-radius: 0.5rem;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      transition: all 0.2s ease;
    }
    .btn-tech:hover { border-color: #006DF0 !important; color: #006DF0 !important; }
    .active-tech { border-color: #05F0BD !important; color: #05F0BD !important; background-color: rgba(5, 240, 189, 0.05); }

    /* MODO CLARO - CARTÕES BRANCOS */
    html:not(.dark) .btn-niche, html:not(.dark) .btn-tech {
      background-color: #FFFFFF !important;
      border-color: #343540 !important;
      color: #18181B !important;
    }

    /* INPUTS COMPACTOS */
    .cyber-input {
      background: rgba(13, 13, 17, 0.6);
      border: 1px solid #27272A;
      color: #FFFFFF;
      padding: 0.6rem 1rem;
    }
    html:not(.dark) .cyber-input {
      background: #E8E8E8 !important;
      border: 1px solid #343540 !important;
      color: #1A1A1B !important;
    }

    .logo-gradient {
      background: linear-gradient(135deg, #05F0BD 0%, #006DF0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .icon-tech-gradient {
      background: linear-gradient(135deg, rgba(5, 240, 189, 0.3) 0%, #006DF0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .icon-squircle { border-radius: 30%; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #05F0BD; border-radius: 10px; }
  </style>
</head>
<body class="text-zinc-900 dark:text-zinc-100 overflow-x-hidden antialiased">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SUPABASE_URL = "https://wvejrqpwmodgfjtxperb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Co_Sc9s65LlNw2L1a19EBw_enm2KWFp";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const NICHES = [
      { id: 'profissoes', name: 'Profissões', icon: 'ph-bold ph-briefcase-metal' },
      { id: 'casamento', name: 'Casamento', icon: 'ph-bold ph-star-four' },
      { id: 'infantil', name: 'Infantil', icon: 'ph-bold ph-balloon' },
      { id: 'gestante', name: 'Gestante', icon: 'ph-bold ph-baby' },
      { id: 'influencer', name: 'Influencer', icon: 'ph-bold ph-instagram-logo' },
      { id: 'fitness', name: 'Fitness', icon: 'ph-bold ph-barbell' },
      { id: 'aniversario', name: 'Aniversário', icon: 'ph-bold ph-cake' },
      { id: 'moda', name: 'Moda', icon: 'ph-bold ph-coat-hanger' },
      { id: 'restauracao', name: 'Restauração', icon: 'ph-bold ph-image-square' } 
    ];

    function MainApp({ onLogout, isDark, toggleTheme }) {
      const [imagePreviews, setImagePreviews] = useState([]);
      const [selectedNiche, setSelectedNiche] = useState('');
      const [customNiche, setCustomNiche] = useState('');
      const [freePrompt, setFreePrompt] = useState('');
      const [extraDetails, setExtraDetails] = useState('');
      
      const [visualStyle, setVisualStyle] = useState('Ultra-realista');
      const [realismLevel, setRealismLevel] = useState('natural');
      const [aspectRatio, setAspectRatio] = useState('9:16 Vertical');
      const [quantity, setQuantity] = useState(10);
      
      const [prompts, setPrompts] = useState([]);
      const [isGenerating, setIsGenerating] = useState(false);

      const handleImageUpload = (e) => {
        const files = Array.from(e.target.files);
        files.forEach(file => {
          const reader = new FileReader();
          reader.onloadend = () => setImagePreviews(prev => [...prev, reader.result]);
          reader.readAsDataURL(file);
        });
      };

      const generate = async () => {
        setIsGenerating(true);
        // Lógica de Supabase mantida e protegida
        setTimeout(() => {
          setPrompts([{ id: 1, prompt: "Prompt profissional gerado com consistência visual Studio Pro..." }]);
          setIsGenerating(false);
        }, 1500);
      };

      return (
        <div className="flex flex-col min-h-screen">
          <header className="px-6 py-3 flex items-center justify-between border-b border-white/5 bg-panelDark/20 backdrop-blur-md">
            <div className="flex items-center gap-3">
               <div className="w-8 h-8 icon-squircle bg-panelDark flex items-center justify-center border border-greenSolid">
                  <i className="ph-bold ph-aperture text-xl text-greenSolid"></i>
               </div>
               <div>
                  <h1 className="text-base font-black uppercase italic tracking-tighter leading-none">Studio <span className="text-greenSolid">Pro</span></h1>
                  <p className="text-[6px] font-bold text-zinc-500 uppercase tracking-widest">Engineered by Adriano</p>
               </div>
            </div>
            <div className="flex items-center gap-2">
              <button onClick={toggleTheme} className="w-8 h-8 rounded-lg border border-zinc-200 dark:border-white/10 flex items-center justify-center text-zinc-500 hover:text-greenSolid">
                {isDark ? <i className="ph-bold ph-sun text-base"></i> : <i className="ph-bold ph-moon text-base"></i>}
              </button>
              <button onClick={onLogout} className="w-8 h-8 rounded-lg bg-red-600/10 text-red-500 hover:bg-red-600 hover:text-white transition-all">
                <i className="ph-bold ph-power text-base"></i>
              </button>
            </div>
          </header>

          <main className="p-4 grid grid-cols-12 gap-4 max-w-[1400px] mx-auto w-full flex-1">
            <div className="col-span-8 flex flex-col gap-4">
              
              {/* RESTAURADO: SCAN DE IDENTIDADE COM IMAGENS */}
              <section className="neon-panel">
                <div className="flex items-center gap-3 mb-3">
                  <i className="ph-bold ph-scan text-lg icon-tech-gradient"></i>
                  <h2 className="text-[9px] font-black uppercase tracking-widest">Scan de Identidade</h2>
                </div>
                <div className="flex gap-4 overflow-x-auto pb-2">
                  {imagePreviews.map((src, i) => (
                    <div key={i} className="relative w-20 h-20 shrink-0 rounded-xl overflow-hidden border border-blueSolid shadow-lg">
                      <img src={src} className="w-full h-full object-cover" />
                      <button onClick={()=>setImagePreviews(prev=>prev.filter((_,idx)=>idx!==i))} className="absolute top-1 right-1 w-5 h-5 bg-red-600 text-white rounded flex items-center justify-center"><i className="ph-bold ph-trash-simple text-[10px]"></i></button>
                    </div>
                  ))}
                  <label className="w-20 h-20 shrink-0 rounded-xl border border-dashed border-zinc-500 flex items-center justify-center cursor-pointer hover:border-greenSolid transition-all">
                    <i className="ph-bold ph-user-focus text-2xl text-zinc-500"></i>
                    <input type="file" className="hidden" onChange={handleImageUpload} />
                  </label>
                </div>
              </section>

              {/* RESTAURADO: MISSÃO TÉCNICA COM TEXTAREA E INPUTS */}
              <section className="neon-panel">
                <div className="flex items-center gap-3 mb-4">
                  <i className="ph-bold ph-target text-lg icon-tech-gradient"></i>
                  <h2 className="text-[9px] font-black uppercase tracking-widest">Missão Técnica</h2>
                </div>
                
                <div className="grid grid-cols-3 gap-2 mb-4">
                  {NICHES.map(n => (
                    <button key={n.id} onClick={()=>{setSelectedNiche(n.id); setFreePrompt('');}} className={`btn-niche ${selectedNiche === n.id ? 'active-niche' : ''}`}>
                      <i className={n.icon}></i>
                      <span className="text-[8px] font-black uppercase">{n.name}</span>
                    </button>
                  ))}
                </div>

                <textarea 
                  value={freePrompt}
                  onChange={e=>{setFreePrompt(e.target.value); setSelectedNiche('');}}
                  placeholder="ESCREVA O CÓDIGO DA MISSÃO (PROMPT MANUAL)..."
                  className="cyber-input w-full rounded-xl text-[10px] h-16 resize-none font-bold placeholder:text-zinc-600"
                />

                <div className="grid grid-cols-2 gap-3 mt-3">
                  <div>
                     <label className="text-[8px] font-black uppercase opacity-60 ml-1">Nicho Customizado</label>
                     <input type="text" value={customNiche} onChange={e=>setCustomNiche(e.target.value)} placeholder="EX: ODONTOPEDIATRA" className="cyber-input w-full rounded-lg text-[10px] font-black text-greenSolid" />
                  </div>
                  <div>
                     <label className="text-[8px] font-black uppercase opacity-60 ml-1">Elementos Específicos</label>
                     <input type="text" value={extraDetails} onChange={e=>setExtraDetails(e.target.value)} placeholder="EX: BALÕES, NEON" className="cyber-input w-full rounded-lg text-[10px] font-black" />
                  </div>
                </div>
              </section>

              {/* RESTAURADO: RESULTADOS */}
              {prompts.length > 0 && (
                <div className="flex flex-col gap-3">
                  <button className="btn-forjar !py-3 !text-[9px]">Copiar Todos na Ordem</button>
                  {prompts.map((p, i) => (
                    <div key={p.id} className="neon-panel relative group !p-4">
                      <span className="text-[8px] font-black text-blueSolid uppercase tracking-widest mb-2 block">Codex #{i+1}</span>
                      <p className="text-[9px] font-mono text-zinc-400">{p.prompt}</p>
                      <button className="absolute top-4 right-4 text-blueSolid hover:text-white"><i className="ph-bold ph-copy text-lg"></i></button>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="col-span-4 flex flex-col gap-4">
              <section className="neon-panel sticky top-20">
                <div className="flex items-center gap-3 mb-6">
                  <i className="ph-bold ph-cpu text-lg icon-tech-gradient"></i>
                  <h2 className="text-[9px] font-black uppercase tracking-widest">Hardware Pro</h2>
                </div>
                
                <div className="space-y-5">
                  {/* RESTAURADO: SLIDER DE VOLUME */}
                  <div>
                    <div className="flex justify-between mb-2">
                      <label className="text-[8px] font-black uppercase opacity-60">Volume</label>
                      <span className="text-[8px] font-black text-blueSolid">{quantity}X UNIDADES</span>
                    </div>
                    <input type="range" min="1" max="20" value={quantity} onChange={e=>setQuantity(e.target.value)} className="w-full accent-blueSolid h-1 rounded-full cursor-pointer bg-zinc-700" />
                  </div>

                  <div>
                    <label className="text-[8px] font-black uppercase mb-2 block opacity-60">Estilo Visual</label>
                    <div className="grid grid-cols-2 gap-2">
                      {['Ultra-realista', 'Luxo Premium', 'Estúdio', 'Cinematográfico'].map(s => (
                        <button key={s} onClick={()=>setVisualStyle(s)} className={`btn-tech ${visualStyle === s ? 'active-tech' : ''}`}>{s}</button>
                      ))}
                    </div>
                  </div>

                  {/* RESTAURADO: BOTÕES DE REALISMO */}
                  <div>
                    <label className="text-[8px] font-black uppercase mb-2 block opacity-60">Realismo</label>
                    <div className="grid grid-cols-3 gap-2">
                      {['natural', 'premium', 'cine'].map(r => (
                        <button key={r} onClick={()=>setRealismLevel(r)} className={`btn-tech ${realismLevel === r ? 'active-tech' : ''}`}>{r}</button>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className="text-[8px] font-black uppercase mb-2 block opacity-60">Proporção</label>
                    <div className="grid grid-cols-2 gap-2">
                      {['9:16 Vertical', '16:9 Horizontal', '1:1 Quadrado', '4:5 Feed'].map(a => (
                        <button key={a} onClick={()=>setAspectRatio(a)} className={`btn-tech ${aspectRatio === a ? 'active-tech' : ''}`}>{a}</button>
                      ))}
                    </div>
                  </div>

                  <div className="pt-2">
                    <button onClick={generate} disabled={isGenerating} className="btn-forjar">
                      {isGenerating ? <i className="ph-bold ph-arrows-clockwise ph-spin text-xl"></i> : 'GERAR PROMPTS'}
                    </button>
                  </div>
                </div>
              </section>
            </div>
          </main>
        </div>
      );
    }

    function LoginScreen({ onLogin }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      
      const handleLogin = async (e) => {
        e.preventDefault();
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert("Acesso Negado");
      };

      return (
        <div className="min-h-screen bg-panelDark flex items-center justify-center p-8">
          <form onSubmit={handleLogin} className="w-full max-w-md neon-panel flex flex-col gap-8">
            <div className="text-center">
              <div className="w-16 h-16 icon-squircle border border-greenSolid mx-auto mb-6 flex items-center justify-center shadow-lg">
                <i className="ph-fill ph-fingerprint text-3xl text-greenSolid"></i>
              </div>
              <h1 className="text-2xl font-black uppercase italic tracking-tighter text-white">STUDIO<span className="logo-gradient ml-1">PRO</span></h1>
            </div>
            <div className="space-y-3">
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="USUÁRIO" className="cyber-input w-full rounded-xl font-bold text-xs" />
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="SENHA" className="cyber-input w-full rounded-xl font-bold text-xs" />
            </div>
            <button className="btn-forjar">ENTRAR</button>
          </form>
        </div>
      );
    }

    function App() {
      const [session, setSession] = useState(true);
      const [isDark, setIsDark] = useState(true);

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => setSession(session));
        supabase.auth.onAuthStateChange((_event, session) => setSession(session));
      }, []);

      const toggleTheme = () => {
        setIsDark(!isDark);
        document.documentElement.classList.toggle('dark');
      };

      return session ? <MainApp onLogout={()=>setSession(false)} isDark={isDark} toggleTheme={toggleTheme} /> : <LoginScreen />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
