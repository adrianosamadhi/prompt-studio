<!DOCTYPE html>
<html lang="pt-PT" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Studio Pro - Engineered by Adriano</title>
  
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#10111B" />
  <link rel="icon" type="image/png" href="icone-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200..800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { 
            panelDark: '#10111B',
            cinzaGPT: '#343540',
            cinzaC1: '#C1C1C3',
            fundoLight: '#F4F4F4',
            greenSolid: '#05F0BD', 
            blueSolid: '#006DF0'
          },
          fontFamily: { 
            sans: ['Plus Jakarta Sans', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace']
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      transition: background 0.5s ease;
      min-height: 100vh;
    }

    /* =========================================
       FUNDO ESCURO: RADIAL + PONTOS DE LUZ
       ========================================= */
    html.dark body {
      background-color: #10111B;
      background-image: 
        radial-gradient(circle at 15% 20%, rgba(5, 240, 189, 0.08) 0%, transparent 35%),
        radial-gradient(circle at 85% 75%, rgba(5, 240, 189, 0.08) 0%, transparent 35%),
        radial-gradient(circle at center, #343540 0%, #10111B 80%);
      background-attachment: fixed;
    }

    html.dark .neon-panel {
      background-color: rgba(16, 17, 27, 0.6); 
      backdrop-filter: blur(16px);
      border: 2px solid rgba(5, 240, 189, 0.18);
    }

    /* =========================================
       MODO CLARO: REFINADO (SEM BRANCO TOTAL)
       ========================================= */
    html:not(.dark) body {
      background-color: #F4F4F4;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(5, 240, 189, 0.15) 0%, transparent 45%),
        radial-gradient(circle at 90% 80%, rgba(5, 240, 189, 0.15) 0%, transparent 45%);
    }
    
    html:not(.dark) .neon-panel {
      background-color: #C1C1C3 !important; 
      border: 2px solid #343540 !important; 
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.20) !important; 
    }

    /* Cores de Texto para o Modo Claro */
    html:not(.dark) h1, html:not(.dark) h2, html:not(.dark) label, html:not(.dark) p {
      color: #1A1A1B !important;
    }

    /* =========================================
       BOTÃO PRINCIPAL: BRANCO COM BORDA VERDE
       ========================================= */
    .btn-forjar {
      background-color: #FFFFFF !important;
      color: #343540 !important;
      border: 3px solid #05F0BD !important;
      box-shadow: 0 8px 20px rgba(5, 240, 189, 0.2);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }
    
    .btn-forjar:hover {
      transform: scale(1.02);
      box-shadow: 0 12px 30px rgba(5, 240, 189, 0.4);
    }

    /* =========================================
       CARTÕES TÉCNICOS (Hardware Pro)
       Fixos = Verde, Hover = Azul
       ========================================= */
    .btn-tech {
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid #52525B; 
      color: #A1A1AA; 
      transition: all 0.3s ease;
    }
    
    .btn-tech:hover {
      border-color: #006DF0 !important; 
      color: #006DF0 !important; 
      transform: scale(1.05);
    }
    
    .active-tech {
      border-color: #05F0BD !important; 
      color: #05F0BD !important; 
      background-color: rgba(5, 240, 189, 0.05);
      transform: scale(1.05); 
    }

    /* Ajuste para Modo Claro nos Cartões */
    html:not(.dark) .btn-tech, html:not(.dark) .btn-niche {
      background-color: #D1D1D4; /* Cinza leve para contraste */
      color: #343540 !important;
      border-color: #8E8E93 !important;
    }

    /* =========================================
       CARTÕES DE NICHO (Missão Técnica)
       Fixos = Azul, Hover = Verde
       ========================================= */
    .btn-niche {
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid #52525B; 
      color: #A1A1AA; 
      transition: all 0.3s ease;
    }
    
    .btn-niche i {
      color: #05F0BD !important; /* Ícones sempre Verdes conforme solicitado */
    }

    .btn-niche:hover {
      border-color: #05F0BD !important; 
      color: #05F0BD !important; 
      transform: scale(1.05);
    }
    
    .active-niche {
      border-color: #006DF0 !important; 
      color: #006DF0 !important; 
      transform: scale(1.05); 
    }

    /* Inputs */
    .cyber-input {
      background: rgba(13, 13, 17, 0.6);
      border: 1px solid #27272A;
      color: #FFFFFF;
    }
    html:not(.dark) .cyber-input {
      background: #E8E8E8 !important;
      border: 1px solid #343540 !important;
      color: #1A1A1B !important;
    }

    .logo-gradient {
      background: linear-gradient(135deg, #05F0BD 0%, #006DF0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .icon-tech-gradient {
      background: linear-gradient(135deg, rgba(5, 240, 189, 0.2) 0%, #006DF0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .icon-squircle { border-radius: 30%; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #05F0BD; border-radius: 10px; }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="text-zinc-900 dark:text-zinc-100 selection:bg-blueSolid/40 overflow-x-hidden antialiased">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SUPABASE_URL = "https://wvejrqpwmodgfjtxperb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Co_Sc9s65LlNw2L1a19EBw_enm2KWFp";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const NICHES = [
      { id: 'profissoes', name: 'Profissões', icon: 'ph-bold ph-briefcase-metal' },
      { id: 'casamento', name: 'Casamento', icon: 'ph-bold ph-star-four' },
      { id: 'infantil', name: 'Infantil', icon: 'ph-bold ph-balloon' },
      { id: 'gestante', name: 'Gestante', icon: 'ph-bold ph-baby' },
      { id: 'influencer', name: 'Influencer', icon: 'ph-bold ph-instagram-logo' },
      { id: 'fitness', name: 'Fitness', icon: 'ph-bold ph-barbell' },
      { id: 'aniversario', name: 'Aniversário', icon: 'ph-bold ph-cake' },
      { id: 'moda', name: 'Moda', icon: 'ph-bold ph-coat-hanger' },
      { id: 'restauracao', name: 'Restauração', icon: 'ph-bold ph-image-square' } 
    ];

    function MainApp({ onLogout, isDark, toggleTheme }) {
      const [prompts, setPrompts] = useState([]);
      const [isGenerating, setIsGenerating] = useState(false);
      const [selectedNiche, setSelectedNiche] = useState('');
      const [visualStyle, setVisualStyle] = useState('Ultra-realista');
      const [realism, setRealism] = useState('natural');
      const [aspectRatio, setAspectRatio] = useState('9:16 Vertical');

      const generate = async () => {
        setIsGenerating(true);
        // Simulação de chamada à API
        setTimeout(() => {
          setPrompts([{ id: 1, prompt: "Prompt profissional gerado com consistência visual Studio Pro..." }]);
          setIsGenerating(false);
        }, 1500);
      };

      return (
        <div className="min-h-screen flex flex-col">
          <header className="sticky top-0 z-50 bg-white/90 dark:bg-panelDark/80 backdrop-blur-xl border-b border-zinc-200 dark:border-white/5 px-10 py-5 flex items-center justify-between shadow-lg">
            <div className="flex items-center gap-5">
               <div className="w-12 h-12 icon-squircle bg-panelDark flex items-center justify-center border border-greenSolid">
                  <i className="ph-bold ph-aperture text-3xl text-greenSolid"></i>
               </div>
               <div>
                  <h1 className="text-xl font-black uppercase italic tracking-tighter leading-none">Studio<span className="logo-gradient ml-1">Pro</span></h1>
                  <span className="text-[8px] font-extrabold text-zinc-500 uppercase tracking-[0.4em]">Engineered by Adriano</span>
               </div>
            </div>
            <div className="flex items-center gap-4">
              <button onClick={toggleTheme} className="w-11 h-11 rounded-xl border border-zinc-200 dark:border-white/5 flex items-center justify-center text-zinc-500 hover:text-blueSolid transition-all">
                {isDark ? <i className="ph-bold ph-sun-dim text-2xl"></i> : <i className="ph-bold ph-moon-stars text-2xl"></i>}
              </button>
              <button onClick={onLogout} className="w-11 h-11 rounded-xl bg-red-600/10 text-red-500 hover:bg-red-600 hover:text-white transition-all flex items-center justify-center">
                <i className="ph-bold ph-power text-xl"></i>
              </button>
            </div>
          </header>

          <main className="max-w-[1600px] mx-auto w-full p-10 grid grid-cols-1 lg:grid-cols-12 gap-10 relative z-10">
            <div className="lg:col-span-8 flex flex-col gap-10">
              
              <section className="fade-in neon-panel p-10 rounded-[2.5rem]">
                <div className="flex items-center gap-4 mb-8">
                  <i className="ph-bold ph-scan text-2xl icon-tech-gradient"></i>
                  <h2 className="text-[11px] font-black uppercase tracking-[0.3em]">Scan de Identidade</h2>
                </div>
                <div className="w-40 h-40 border-2 border-dashed border-zinc-400 dark:border-zinc-700 rounded-3xl flex items-center justify-center cursor-pointer hover:border-blueSolid transition-all">
                   <i className="ph-bold ph-user-focus text-4xl text-zinc-400"></i>
                </div>
              </section>

              <section className="fade-in neon-panel p-10 rounded-[2.5rem]">
                <div className="flex items-center gap-4 mb-8">
                  <i className="ph-bold ph-target text-2xl icon-tech-gradient"></i>
                  <h2 className="text-[11px] font-black uppercase tracking-[0.3em]">Missão Técnica</h2>
                </div>
                <div className="grid grid-cols-2 md:grid-cols-3 gap-5">
                  {NICHES.map(n => (
                    <button key={n.id} onClick={()=>setSelectedNiche(n.id)} className={`btn-niche p-6 rounded-[1.5rem] flex flex-col items-center gap-4 ${selectedNiche === n.id ? 'active-niche' : ''}`}>
                      <i className={`${n.icon} text-4xl`}></i>
                      <span className="text-[9px] font-black uppercase tracking-[0.2em]">{n.name}</span>
                    </button>
                  ))}
                </div>
              </section>
            </div>

            <div className="lg:col-span-4">
              <div className="sticky top-32 flex flex-col gap-10">
                <section className="fade-in neon-panel p-10 rounded-[3rem]">
                  <div className="flex items-center gap-4 mb-10">
                    <i className="ph-bold ph-cpu text-2xl icon-tech-gradient"></i>
                    <h2 className="text-[11px] font-black uppercase tracking-[0.3em]">Hardware Pro</h2>
                  </div>
                  
                  <div className="space-y-8">
                    <div>
                       <label className="text-[10px] font-black uppercase tracking-widest block mb-4">Estilo Visual</label>
                       <div className="grid grid-cols-2 gap-2">
                         {['Ultra-realista', 'Luxo Premium', 'Estúdio', 'Cinematográfico'].map(s => (
                           <button key={s} onClick={()=>setVisualStyle(s)} className={`btn-tech py-3 rounded-xl text-[9px] font-bold uppercase ${visualStyle === s ? 'active-tech' : ''}`}>{s}</button>
                         ))}
                       </div>
                    </div>

                    <div>
                       <label className="text-[10px] font-black uppercase tracking-widest block mb-4">Realismo</label>
                       <div className="grid grid-cols-3 gap-2">
                         {['natural', 'premium', 'cine'].map(r => (
                           <button key={r} onClick={()=>setRealism(r)} className={`btn-tech py-3 rounded-xl text-[9px] font-bold uppercase ${realism === r ? 'active-tech' : ''}`}>{r}</button>
                         ))}
                       </div>
                    </div>

                    <div>
                       <label className="text-[10px] font-black uppercase tracking-widest block mb-4">Proporção</label>
                       <div className="grid grid-cols-2 gap-2">
                         {['9:16 Vertical', '16:9 Horizontal', '1:1 Quadrado', '4:5 Feed'].map(a => (
                           <button key={a} onClick={()=>setAspectRatio(a)} className={`btn-tech py-3 rounded-xl text-[9px] font-bold uppercase ${aspectRatio === a ? 'active-tech' : ''}`}>{a}</button>
                         ))}
                       </div>
                    </div>

                    <button onClick={generate} disabled={isGenerating} className="btn-forjar w-full py-7 rounded-[2rem] flex items-center justify-center gap-4 text-[11px]">
                      {isGenerating ? <i className="ph-bold ph-arrows-clockwise ph-spin text-2xl"></i> : 'GERAR PROMPTS'}
                    </button>
                  </div>
                </section>
              </div>
            </div>
          </main>
        </div>
      );
    }

    function LoginScreen({ onLogin }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      
      const handleLogin = async (e) => {
        e.preventDefault();
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert("Acesso Negado");
      };

      return (
        <div className="min-h-screen bg-panelDark flex items-center justify-center p-8">
          <form onSubmit={handleLogin} className="w-full max-w-md neon-panel p-16 rounded-[4rem] flex flex-col gap-10 relative z-10">
            <div className="text-center">
              <div className="w-20 h-20 icon-squircle border-2 border-greenSolid mx-auto mb-8 flex items-center justify-center shadow-lg shadow-greenSolid/20">
                <i className="ph-fill ph-fingerprint text-4xl text-greenSolid"></i>
              </div>
              <h1 className="text-3xl font-black uppercase italic tracking-tighter text-white">STUDIO<span className="logo-gradient ml-1">PRO</span></h1>
              <p className="text-zinc-500 text-[9px] font-black uppercase tracking-[0.4em] mt-3">Authorized Access Only</p>
            </div>
            <div className="space-y-4">
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="USUÁRIO" className="cyber-input w-full p-5 rounded-2xl font-bold text-xs" />
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="SENHA" className="cyber-input w-full p-5 rounded-2xl font-bold text-xs" />
            </div>
            <button className="btn-forjar w-full py-6 rounded-3xl text-[10px]">ENTRAR</button>
          </form>
        </div>
      );
    }

    function App() {
      const [session, setSession] = useState(null);
      const [isDark, setIsDark] = useState(true);

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => setSession(session));
        supabase.auth.onAuthStateChange((_event, session) => setSession(session));
      }, []);

      const toggleTheme = () => {
        setIsDark(!isDark);
        document.documentElement.classList.toggle('dark');
      };

      return session ? <MainApp onLogout={()=>supabase.auth.signOut()} isDark={isDark} toggleTheme={toggleTheme} /> : <LoginScreen />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
