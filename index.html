<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Prompt Consistency Studio Pro</title>
  
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0A0A0B" />
  <link rel="icon" type="image/png" href="icone-192.png" />
  <link rel="apple-touch-icon" href="icone-192.png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { background: '#0A0A0B' },
          fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Merriweather', 'serif'] },
          animation: {
            'fade-in': 'fadeIn 0.4s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Estilização customizada para o range input */
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 20px;
      width: 20px;
      border-radius: 50%;
      background: #f97316;
      cursor: pointer;
      margin-top: -8px;
    }
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 4px;
      background: #27272a;
      border-radius: 2px;
    }
  </style>
</head>
<body class="bg-zinc-50 dark:bg-background text-zinc-900 dark:text-white transition-colors duration-300 selection:bg-orange-500/30 overflow-x-hidden antialiased">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const SUPABASE_URL = "https://wvejrqpwmodgfjtxperb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Co_Sc9s65LlNw2L1a19EBw_enm2KWFp";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const GEMINI_MODELS = ["gemini-3.1-pro-preview", "gemini-3.1-flash-lite"];

    async function fetchWithRetry(payload, retries = 3) {
      const delays = [1000, 2000, 4000];
      for (let m = 0; m < GEMINI_MODELS.length; m++) {
        const currentModel = GEMINI_MODELS[m];
        for (let i = 0; i < retries; i++) {
          try {
            const { data, error } = await supabase.functions.invoke('gerar-prompt', {
              body: JSON.stringify({ model: currentModel, payload: payload })
            });
            if (error) throw error;
            return data;
          } catch (e) {
            if (i === retries - 1 && m === GEMINI_MODELS.length - 1) throw e;
            await new Promise(res => setTimeout(res, delays[i]));
          }
        }
      }
    }

    async function generatePromptsAPI({ imagePreviews, niche, customNiche, extraDetails, visualStyle, aspectRatio, language, settings }) {
      const targetNiche = customNiche.trim() !== '' ? customNiche : niche;
      const qty = settings?.quantity || 10;
      const arParam = "--ar " + aspectRatio.split(' ')[0];

      const systemInstruction = `ROLE: Deterministic Prompt-to-JSON Engine. Biometric Analyzer.
RULES: 
1. Extract exact body proportions from image.
2. Output ONLY valid JSON array of objects.
3. Append "${arParam}" at the end of every prompt string.`;

      let promptText = `Generate ${qty} prompts for niche: ${targetNiche}. Style: ${visualStyle}. Realism: ${settings.realismLevel}. Gender: ${settings.targetGender}. Details: ${extraDetails}.`;

      const payload = {
        systemInstruction: { parts: [{ text: systemInstruction }] },
        contents: [{ role: "user", parts: [{ text: promptText }] }],
        generationConfig: {
          responseMimeType: "application/json",
          responseSchema: { type: "ARRAY", items: { type: "OBJECT", properties: { prompt: { type: "STRING" } }, required: ["prompt"] } }
        }
      };

      if (imagePreviews && imagePreviews.length > 0) {
        imagePreviews.forEach((preview) => {
          const base64Data = preview.split(',')[1];
          const mimeType = preview.split(';')[0].split(':')[1];
          payload.contents[0].parts.push({ inlineData: { mimeType, data: base64Data } });
        });
      }

      const data = await fetchWithRetry(payload);
      return data.map((item) => ({ prompt: item.prompt, id: crypto.randomUUID() }));
    }

    // --- COMPONENTES DE DESIGN ---
    function OptionButton({ label, active, onClick }) {
      return (
        <button 
          onClick={onClick}
          className={`px-4 py-2 text-[10px] uppercase font-bold tracking-wider rounded-lg border-2 transition-all active:scale-95 ${
            active 
            ? 'bg-orange-500 border-orange-500 text-white shadow-lg shadow-orange-500/20' 
            : 'bg-white dark:bg-zinc-900 border-zinc-200 dark:border-white/10 text-zinc-500 dark:text-zinc-400 hover:border-orange-500/50'
          }`}
        >
          {label}
        </button>
      );
    }

    const NICHES = [
      { id: 'aniversario', name: 'Aniversário', icon: '🎂' },
      { id: 'profissoes', name: 'Profissões', icon: '💼' },
      { id: 'influencer', name: 'Influencer', icon: '📱' },
      { id: 'casamento', name: 'Casamento', icon: '💍' },
      { id: 'gestante', name: 'Gestante', icon: '🤰' },
      { id: 'familia', name: 'Família', icon: '👨‍👩‍👧‍👦' },
      { id: 'musculacao', name: 'Fitness', icon: '🏋️‍♂️' },
      { id: 'moda', name: 'Moda', icon: '👗' }
    ];

    function MainApp({ onLogout, isDark, toggleTheme }) {
      const [activeTab, setActiveTab] = useState('prompts');
      const [imagePreviews, setImagePreviews] = useState([]);
      const [selectedNiche, setSelectedNiche] = useState('');
      const [customNiche, setCustomNiche] = useState('');
      const [extraDetails, setExtraDetails] = useState('');
      const [prompts, setPrompts] = useState([]);
      const [isGenerating, setIsGenerating] = useState(false);
      const [history, setHistory] = useState([]);
      const [showHistory, setShowHistory] = useState(false);

      // --- CONFIGS NO CARD DA DIREITA ---
      const [visualStyle, setVisualStyle] = useState('Ultra-realista');
      const [aspectRatio, setAspectRatio] = useState('9:16 Vertical');
      const [language, setLanguage] = useState('Inglês');
      const [settings, setSettings] = useState({
        quantity: 10, realismLevel: 'natural', creativeIntensity: 'média',
        keepClothes: false, keepBackground: false, targetGender: 'auto'
      });

      const handleImageUpload = (e) => {
        const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
        files.forEach(file => {
          const reader = new FileReader();
          reader.onloadend = () => setImagePreviews(prev => [...prev, reader.result]);
          reader.readAsDataURL(file);
        });
      };

      const generate = async () => {
        setIsGenerating(true);
        try {
          const result = await generatePromptsAPI({
            imagePreviews, niche: selectedNiche, customNiche, extraDetails,
            visualStyle, aspectRatio, language, settings
          });
          setPrompts(result);
          setHistory(prev => [{ date: new Date().toLocaleTimeString(), data: result }, ...prev]);
        } catch (e) { alert("Erro na geração: " + e.message); }
        finally { setIsGenerating(false); }
      };

      return (
        <div className="min-h-screen flex flex-col transition-all duration-300">
          <header className="sticky top-0 z-50 bg-white/80 dark:bg-black/80 backdrop-blur-xl border-b border-zinc-200 dark:border-white/10 px-6 py-4 flex items-center justify-between">
            <div className="flex items-center gap-4">
               <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-orange-500 to-amber-500 flex items-center justify-center shadow-lg shadow-orange-500/20">
                  <i className="ph ph-aperture text-2xl text-white"></i>
               </div>
               <h1 className="text-lg font-black uppercase tracking-tighter italic">Prompt Studio Pro</h1>
            </div>
            <div className="flex items-center gap-3">
              <button onClick={() => setShowHistory(!showHistory)} className="p-2.5 rounded-xl border border-zinc-200 dark:border-white/10 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all flex items-center gap-2">
                <i className="ph ph-clock-counter-clockwise text-xl"></i>
                <span className="text-xs font-bold uppercase hidden md:inline">Histórico</span>
              </button>
              <button onClick={toggleTheme} className="p-2.5 rounded-xl border border-zinc-200 dark:border-white/10 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all">
                {isDark ? <i className="ph ph-sun text-xl"></i> : <i className="ph ph-moon text-xl"></i>}
              </button>
              <button onClick={onLogout} className="p-2.5 rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-all">
                <i className="ph ph-sign-out text-xl"></i>
              </button>
            </div>
          </header>

          <main className="flex-1 max-w-[1400px] mx-auto w-full p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            {/* COLUNA DA ESQUERDA: INPUTS */}
            <div className="lg:col-span-8 flex flex-col gap-8">
              
              {/* PASSO 1: FOTO */}
              <section className="bg-white dark:bg-zinc-900/50 p-8 rounded-3xl border border-zinc-200 dark:border-white/5 shadow-sm">
                <div className="flex items-center gap-3 mb-6">
                  <span className="w-8 h-8 rounded-full bg-orange-500 text-white flex items-center justify-center font-bold text-sm italic">01</span>
                  <h2 className="text-sm font-black uppercase tracking-widest text-zinc-400">Biometria do Cliente</h2>
                </div>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                  {imagePreviews.map((src, i) => (
                    <div key={i} className="relative aspect-square rounded-2xl overflow-hidden border-2 border-orange-500">
                      <img src={src} className="w-full h-full object-cover" />
                      <button onClick={()=>setImagePreviews(prev=>prev.filter((_,idx)=>idx!==i))} className="absolute top-2 right-2 p-1 bg-black/50 text-white rounded-full"><i className="ph ph-x"></i></button>
                    </div>
                  ))}
                  <label className="aspect-square rounded-2xl border-2 border-dashed border-zinc-300 dark:border-white/10 flex flex-col items-center justify-center cursor-pointer hover:border-orange-500 transition-all bg-zinc-50 dark:bg-zinc-900">
                    <i className="ph ph-plus text-3xl text-zinc-400"></i>
                    <input type="file" className="hidden" onChange={handleImageUpload} />
                  </label>
                </div>
              </section>

              {/* PASSO 2: NICHO */}
              <section className="bg-white dark:bg-zinc-900/50 p-8 rounded-3xl border border-zinc-200 dark:border-white/5 shadow-sm">
                <div className="flex items-center gap-3 mb-6">
                  <span className="w-8 h-8 rounded-full bg-orange-500 text-white flex items-center justify-center font-bold text-sm italic">02</span>
                  <h2 className="text-sm font-black uppercase tracking-widest text-zinc-400">Nicho e Cenário</h2>
                </div>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                  {NICHES.map(n => (
                    <button key={n.id} onClick={()=>setSelectedNiche(n.id)} className={`p-4 rounded-2xl border-2 transition-all flex flex-col items-center gap-2 ${selectedNiche === n.id ? 'border-orange-500 bg-orange-500/10' : 'border-zinc-100 dark:border-white/5 hover:border-orange-500/50'}`}>
                      <span className="text-2xl">{n.icon}</span>
                      <span className="text-[10px] font-bold uppercase tracking-wider">{n.name}</span>
                    </button>
                  ))}
                </div>
                <input 
                  type="text" 
                  value={customNiche}
                  onChange={e=>setCustomNiche(e.target.value)}
                  placeholder="Ou digite um nicho personalizado..."
                  className="w-full bg-zinc-100 dark:bg-zinc-900 border-none rounded-2xl p-4 text-sm focus:ring-2 ring-orange-500 outline-none transition-all"
                />
                <textarea 
                  value={extraDetails}
                  onChange={e=>setExtraDetails(e.target.value)}
                  placeholder="Detalhes extras (ex: Balões dourados, segurando um estetoscópio...)"
                  className="w-full mt-4 bg-zinc-100 dark:bg-zinc-900 border-none rounded-2xl p-4 text-sm h-24 focus:ring-2 ring-orange-500 outline-none transition-all resize-none"
                />
              </section>

              {prompts.length > 0 && (
                <section className="animate-fade-in flex flex-col gap-4 mb-10">
                  <div className="flex items-center justify-between">
                    <h2 className="text-xl font-black uppercase italic tracking-tighter">Resultados</h2>
                    <button onClick={()=>{
                      const text = prompts.map((p,i)=>`Prompt ${i+1}:\n${p.prompt}`).join('\n\n');
                      navigator.clipboard.writeText(text);
                    }} className="px-6 py-3 bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 rounded-xl font-bold text-xs uppercase tracking-widest flex items-center gap-2">
                      <i className="ph ph-copy"></i> Copiar Todos na Ordem
                    </button>
                  </div>
                  {prompts.map((p, i) => (
                    <div key={p.id} className="bg-white dark:bg-zinc-900 p-6 rounded-2xl border border-zinc-200 dark:border-white/10">
                      <div className="flex justify-between items-center mb-3">
                        <span className="text-[10px] font-black uppercase text-orange-500 tracking-widest">Prompt {i+1}</span>
                        <button onClick={()=>navigator.clipboard.writeText(p.prompt)} className="text-zinc-400 hover:text-orange-500"><i className="ph ph-copy text-xl"></i></button>
                      </div>
                      <p className="text-xs font-mono text-zinc-500 dark:text-zinc-400 leading-relaxed break-words">{p.prompt}</p>
                    </div>
                  ))}
                </section>
              )}
            </div>

            {/* COLUNA DA DIREITA: CONTROLES FIXOS */}
            <div className="lg:col-span-4">
              <div className="sticky top-28 flex flex-col gap-6">
                
                <section className="bg-white dark:bg-zinc-900 p-8 rounded-[2rem] border border-zinc-200 dark:border-white/10 shadow-xl relative overflow-hidden">
                  <div className="absolute top-0 right-0 p-4 opacity-5">
                    <i className="ph ph-sliders text-9xl"></i>
                  </div>

                  <div className="flex items-center gap-3 mb-8">
                    <span className="w-8 h-8 rounded-full bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 flex items-center justify-center font-bold text-sm italic">03</span>
                    <h2 className="text-sm font-black uppercase tracking-widest text-zinc-500">Controles Pro</h2>
                  </div>

                  <div className="flex flex-col gap-8">
                    {/* VOLUME */}
                    <div>
                      <div className="flex justify-between mb-4">
                        <label className="text-[10px] font-black uppercase tracking-widest text-zinc-400">Quantidade</label>
                        <span className="text-sm font-black text-orange-500">{settings.quantity} prompts</span>
                      </div>
                      <input 
                        type="range" min="1" max="20" 
                        value={settings.quantity}
                        onChange={e=>setSettings({...settings, quantity: e.target.value})}
                        className="w-full accent-orange-500 bg-zinc-200 rounded-lg appearance-none cursor-pointer"
                      />
                    </div>

                    {/* ESTILO VISUAL */}
                    <div>
                      <label className="text-[10px] font-black uppercase tracking-widest text-zinc-400 block mb-4">Estilo Visual</label>
                      <div className="flex flex-wrap gap-2">
                        {['Ultra-realista', 'Luxo Premium', 'Estúdio', 'Cinematográfico'].map(s => (
                          <OptionButton key={s} label={s} active={visualStyle === s} onClick={()=>setVisualStyle(s)} />
                        ))}
                      </div>
                    </div>

                    {/* REALISMO */}
                    <div>
                      <label className="text-[10px] font-black uppercase tracking-widest text-zinc-400 block mb-4">Nível de Realismo</label>
                      <div className="flex flex-wrap gap-2">
                        {['natural', 'premium', 'cinematográfico'].map(r => (
                          <OptionButton key={r} label={r} active={settings.realismLevel === r} onClick={()=>setSettings({...settings, realismLevel: r})} />
                        ))}
                      </div>
                    </div>

                    {/* FORMATO */}
                    <div>
                      <label className="text-[10px] font-black uppercase tracking-widest text-zinc-400 block mb-4">Formato / Aspect Ratio</label>
                      <div className="flex flex-wrap gap-2">
                        {['9:16 Vertical', '16:9 Horizontal', '1:1 Quadrado'].map(a => (
                          <OptionButton key={a} label={a} active={aspectRatio === a} onClick={()=>setAspectRatio(a)} />
                        ))}
                      </div>
                    </div>

                    {/* GÊNERO */}
                    <div>
                      <label className="text-[10px] font-black uppercase tracking-widest text-zinc-400 block mb-4">Gênero Alvo</label>
                      <div className="flex flex-wrap gap-2">
                        {['auto', 'feminino', 'masculino', 'criança'].map(g => (
                          <OptionButton key={g} label={g} active={settings.targetGender === g} onClick={()=>setSettings({...settings, targetGender: g})} />
                        ))}
                      </div>
                    </div>

                    <button 
                      onClick={generate}
                      disabled={isGenerating || (!selectedNiche && !customNiche)}
                      className="w-full mt-4 py-5 bg-gradient-to-r from-orange-600 to-orange-400 hover:from-orange-500 hover:to-orange-300 text-white rounded-2xl font-black uppercase tracking-[0.2em] shadow-lg shadow-orange-500/20 disabled:opacity-50 transition-all active:scale-[0.98] flex items-center justify-center gap-3"
                    >
                      {isGenerating ? (
                        <i className="ph ph-spinner ph-spin text-xl"></i>
                      ) : (
                        <>
                          <i className="ph ph-magic-wand text-xl"></i>
                          Gerar Agora
                        </>
                      )}
                    </button>
                  </div>
                </section>

                {/* HISTÓRICO FLUTUANTE */}
                {showHistory && (
                  <div className="bg-white dark:bg-zinc-900 p-6 rounded-[2rem] border-2 border-orange-500 animate-fade-in shadow-2xl">
                    <h3 className="text-[10px] font-black uppercase tracking-widest mb-4 flex items-center gap-2">
                      <i className="ph ph-clock-counter-clockwise"></i> Últimas Gerações
                    </h3>
                    <div className="flex flex-col gap-3">
                      {history.map((h, i) => (
                        <div key={i} className="p-3 bg-zinc-100 dark:bg-zinc-800 rounded-xl flex justify-between items-center text-xs">
                          <span className="font-bold">Geração {h.date}</span>
                          <button onClick={()=>setPrompts(h.data)} className="text-orange-500 font-bold hover:underline">Abrir</button>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

              </div>
            </div>
          </main>
        </div>
      );
    }

    function LoginScreen({ isDark, toggleTheme }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true);
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert(error.message);
        setLoading(false);
      };

      return (
        <div className="min-h-screen bg-zinc-50 dark:bg-background flex items-center justify-center p-4">
          <form onSubmit={handleLogin} className="w-full max-w-md bg-white dark:bg-zinc-900 p-10 rounded-[2.5rem] shadow-2xl border border-zinc-200 dark:border-white/5 flex flex-col gap-6">
            <div className="text-center mb-4">
              <div className="w-16 h-16 bg-orange-500 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg shadow-orange-500/30">
                <i className="ph ph-lock-key text-3xl text-white"></i>
              </div>
              <h1 className="text-2xl font-black uppercase italic tracking-tighter">Acesso Exclusivo</h1>
              <p className="text-zinc-500 text-xs mt-2 font-bold uppercase tracking-widest">Painel do Especialista</p>
            </div>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="Seu e-mail" className="w-full bg-zinc-100 dark:bg-zinc-800 border-none p-4 rounded-xl outline-none focus:ring-2 ring-orange-500" />
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Senha do Sistema" className="w-full bg-zinc-100 dark:bg-zinc-800 border-none p-4 rounded-xl outline-none focus:ring-2 ring-orange-500" />
            <button className="w-full py-4 bg-orange-500 text-white rounded-xl font-black uppercase tracking-widest hover:bg-orange-600 transition-all shadow-lg shadow-orange-500/20">
              {loading ? 'Validando...' : 'Entrar Agora'}
            </button>
            <p className="text-[10px] text-center text-zinc-400">Senha Padrão: Prompt@123</p>
          </form>
        </div>
      );
    }

    function App() {
      const [session, setSession] = useState(null);
      const [isDark, setIsDark] = useState(true);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          setLoading(false);
        });
        supabase.auth.onAuthStateChange((_event, session) => setSession(session));
      }, []);

      const toggleTheme = () => {
        setIsDark(!isDark);
        document.documentElement.classList.toggle('dark');
      };

      if (loading) return null;
      return session ? <MainApp onLogout={()=>supabase.auth.signOut()} isDark={isDark} toggleTheme={toggleTheme} /> : <LoginScreen isDark={isDark} toggleTheme={toggleTheme} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
