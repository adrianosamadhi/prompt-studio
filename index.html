<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Prompt Consistency Studio Pro</title>
  
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#000000" />
  <link rel="icon" type="image/png" href="icone-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200..800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { 
            background: '#000000',
            panel: '#090A11',
            accent: '#00f2ff', // Azul Elétrico
            neonGreen: '#05F0BD', // Verde Neon solicitado
            darkGray: '#10111B'
          },
          fontFamily: { 
            sans: ['Plus Jakarta Sans', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace']
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.4s ease; }

    /* Efeito de Borda Neon Verde */
    .neon-panel {
      border: 1px solid rgba(5, 240, 189, 0.2);
      box-shadow: 0 0 20px rgba(5, 240, 189, 0.05);
      transition: all 0.3s ease;
    }
    .dark .neon-panel:hover {
      border-color: #05F0BD;
      box-shadow: 0 0 30px rgba(5, 240, 189, 0.15);
    }

    /* Botão Estilo Black Piano com Brilho Azul */
    .btn-piano {
      background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 100%);
      background-color: #10111B;
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .active-blue {
      background: linear-gradient(180deg, #00f2ff 0%, #0066ff 100%);
      box-shadow: 0 0 25px rgba(0, 242, 255, 0.4), inset 0 1px 2px rgba(255,255,255,0.5);
      border-color: #00f2ff !important;
      color: #000 !important;
    }

    .active-blue i { color: #000 !important; }

    /* Estilo de Inputs */
    .cyber-input {
      background: #0d0d11;
      border: 1px solid #1e1e22;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
    }
    .cyber-input:focus {
      border-color: #05F0BD;
      box-shadow: 0 0 15px rgba(5, 240, 189, 0.1);
    }

    .icon-squircle {
      border-radius: 35%;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #1e1e22; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #05F0BD; }
  </style>
</head>
<body class="bg-zinc-50 dark:bg-background text-zinc-900 dark:text-zinc-100 selection:bg-accent/40 overflow-x-hidden antialiased">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // Configuração Supabase
    const SUPABASE_URL = "https://wvejrqpwmodgfjtxperb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Co_Sc9s65LlNw2L1a19EBw_enm2KWFp";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const GEMINI_MODELS = ["gemini-3.1-pro-preview", "gemini-3.1-flash-lite"];

    async function fetchWithRetry(payload, retries = 3) {
      for (let m = 0; m < GEMINI_MODELS.length; m++) {
        const currentModel = GEMINI_MODELS[m];
        for (let i = 0; i < retries; i++) {
          try {
            const { data, error } = await supabase.functions.invoke('gerar-prompt', {
              body: JSON.stringify({ model: currentModel, payload: payload })
            });
            if (error) throw error;
            return data;
          } catch (e) {
            if (i === retries - 1 && m === GEMINI_MODELS.length - 1) throw e;
            await new Promise(res => setTimeout(res, 1000));
          }
        }
      }
    }

    async function generatePromptsAPI({ imagePreviews, niche, customNiche, freePrompt, extraDetails, visualStyle, aspectRatio, settings }) {
      const targetNiche = customNiche.trim() !== '' ? customNiche : niche;
      const qty = settings?.quantity || 10;
      const arParam = "--ar " + aspectRatio.split(' ')[0];

      const systemInstruction = `ROLE: Deterministic Prompt-to-JSON Engine. Biometric Analyzer. Append "${arParam}" to all prompt strings.`;
      let promptText = freePrompt.trim() !== '' 
        ? `Variations based on: "${freePrompt}". Style: ${visualStyle}. Format: ${arParam}.`
        : `Niche: ${targetNiche}. Style: ${visualStyle}. Realism: ${settings.realismLevel}. Format: ${arParam}.`;

      const payload = {
        systemInstruction: { parts: [{ text: systemInstruction }] },
        contents: [{ role: "user", parts: [{ text: promptText }] }],
        generationConfig: { responseMimeType: "application/json" }
      };

      if (imagePreviews.length > 0) {
        imagePreviews.forEach((preview) => {
          const base64Data = preview.split(',')[1];
          const mimeType = preview.split(';')[0].split(':')[1];
          payload.contents[0].parts.push({ inlineData: { mimeType, data: base64Data } });
        });
      }

      const data = await fetchWithRetry(payload);
      const textResult = data.candidates?.[0]?.content?.parts?.[0]?.text || "[]";
      return JSON.parse(textResult).map(item => ({ prompt: item.prompt, id: crypto.randomUUID() }));
    }

    function ControlButton({ label, active, onClick }) {
      return (
        <button 
          onClick={onClick}
          className={`btn-piano px-4 py-3 text-[9px] font-black uppercase tracking-[0.2em] rounded-xl transition-all duration-300 transform active:scale-95 ${
            active ? 'active-blue' : 'text-zinc-500 hover:text-accent'
          }`}
        >
          {label}
        </button>
      );
    }

    const NICHES = [
      { id: 'aniversario', name: 'Comemoração', icon: 'ph-duotone ph-cake' },
      { id: 'profissoes', name: 'Executivo', icon: 'ph-duotone ph-briefcase-metal' },
      { id: 'influencer', name: 'Lifestyle', icon: 'ph-duotone ph-instagram-logo' },
      { id: 'casamento', name: 'Casamento', icon: 'ph-duotone ph-star-four' },
      { id: 'gestante', name: 'Maternidade', icon: 'ph-duotone ph-baby' },
      { id: 'familia', name: 'Legado', icon: 'ph-duotone ph-users-three' },
      { id: 'musculacao', name: 'Performance', icon: 'ph-duotone ph-barbell' },
      { id: 'moda', name: 'Moda', icon: 'ph-duotone ph-coat-hanger' }
    ];

    function MainApp({ onLogout, isDark, toggleTheme }) {
      const [imagePreviews, setImagePreviews] = useState([]);
      const [selectedNiche, setSelectedNiche] = useState('');
      const [customNiche, setCustomNiche] = useState('');
      const [freePrompt, setFreePrompt] = useState('');
      const [extraDetails, setExtraDetails] = useState('');
      const [prompts, setPrompts] = useState([]);
      const [isGenerating, setIsGenerating] = useState(false);
      const [history, setHistory] = useState([]);
      const [showHistory, setShowHistory] = useState(false);

      const [visualStyle, setVisualStyle] = useState('Ultra-realista');
      const [aspectRatio, setAspectRatio] = useState('9:16 Vertical');
      const [settings, setSettings] = useState({ quantity: 10, realismLevel: 'natural' });

      const handleImageUpload = (e) => {
        const files = Array.from(e.target.files);
        files.forEach(file => {
          const reader = new FileReader();
          reader.onloadend = () => setImagePreviews(prev => [...prev, reader.result]);
          reader.readAsDataURL(file);
        });
      };

      const generate = async () => {
        setIsGenerating(true);
        try {
          const result = await generatePromptsAPI({
            imagePreviews, niche: selectedNiche, customNiche, freePrompt, extraDetails,
            visualStyle, aspectRatio, settings
          });
          setPrompts(result);
          setHistory(prev => [{ date: new Date().toLocaleTimeString(), data: result }, ...prev]);
        } catch (e) { console.error(e); }
        finally { setIsGenerating(false); }
      };

      return (
        <div className="min-h-screen flex flex-col">
          <header className="sticky top-0 z-50 bg-black/80 backdrop-blur-xl border-b border-white/5 px-10 py-5 flex items-center justify-between shadow-2xl">
            <div className="flex items-center gap-5">
               <div className="w-12 h-12 icon-squircle bg-accent flex items-center justify-center shadow-[0_0_20px_rgba(0,242,255,0.4)]">
                  <i className="ph-duotone ph-aperture text-3xl text-black"></i>
               </div>
               <div>
                  <h1 className="text-xl font-black uppercase italic tracking-tighter text-white leading-none">Studio<span className="text-neonGreen">Pro</span></h1>
                  <span className="text-[8px] font-black text-zinc-500 uppercase tracking-[0.4em]">Engineered by Adriano</span>
               </div>
            </div>
            <div className="flex items-center gap-4">
              <button onClick={() => setShowHistory(!showHistory)} className="btn-piano px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-[0.2em] text-zinc-400">
                Arquivo de Consultas
              </button>
              <button onClick={toggleTheme} className="w-11 h-11 rounded-xl border border-white/5 flex items-center justify-center text-orange-500 hover:bg-accent/10 transition-all">
                {isDark ? <i className="ph-duotone ph-sun-dim text-2xl"></i> : <i className="ph-duotone ph-moon-stars text-2xl"></i>}
              </button>
              <button onClick={onLogout} className="w-11 h-11 rounded-xl bg-red-600/10 text-red-500 hover:bg-red-600 hover:text-white transition-all flex items-center justify-center">
                <i className="ph-bold ph-power text-xl"></i>
              </button>
            </div>
          </header>

          <main className="max-w-[1600px] mx-auto w-full p-10 grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <div className="lg:col-span-8 flex flex-col gap-10">
              {/* PASSO 1: IDENTIDADE */}
              <section className="bg-panel p-10 rounded-[3rem] neon-panel relative overflow-hidden">
                <div className="flex items-center gap-4 mb-10">
                  <div className="w-10 h-10 icon-squircle bg-neonGreen/10 flex items-center justify-center text-neonGreen shadow-[0_0_15px_rgba(5,240,189,0.2)]">
                    <i className="ph-duotone ph-scan text-2xl"></i>
                  </div>
                  <h2 className="text-[11px] font-black uppercase tracking-[0.3em] text-zinc-400">Scan de Identidade</h2>
                </div>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                  {imagePreviews.map((src, i) => (
                    <div key={i} className="relative aspect-square rounded-[2rem] overflow-hidden border-2 border-neonGreen shadow-2xl">
                      <img src={src} className="w-full h-full object-cover" />
                      <button onClick={()=>setImagePreviews(prev=>prev.filter((_,idx)=>idx!==i))} className="absolute top-3 right-3 w-8 h-8 bg-red-600 text-white rounded-xl flex items-center justify-center shadow-lg"><i className="ph-bold ph-trash"></i></button>
                    </div>
                  ))}
                  <label className="aspect-square rounded-[2rem] border-2 border-dashed border-white/10 flex flex-col items-center justify-center cursor-pointer hover:border-neonGreen transition-all group">
                    <i className="ph-duotone ph-user-focus text-4xl text-zinc-800 group-hover:text-neonGreen"></i>
                    <input type="file" className="hidden" onChange={handleImageUpload} />
                  </label>
                </div>
              </section>

              {/* PASSO 2: DIRETRIZES */}
              <section className="bg-panel p-10 rounded-[3rem] neon-panel">
                <div className="flex items-center gap-4 mb-10">
                  <div className="w-10 h-10 icon-squircle bg-neonGreen/10 flex items-center justify-center text-neonGreen shadow-[0_0_15px_rgba(5,240,189,0.2)]">
                    <i className="ph-duotone ph-target text-2xl"></i>
                  </div>
                  <h2 className="text-[11px] font-black uppercase tracking-[0.3em] text-zinc-400">Diretrizes da Missão</h2>
                </div>
                
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                  {NICHES.map(n => (
                    <button key={n.id} onClick={()=>{setSelectedNiche(n.id); setFreePrompt('');}} className={`btn-piano p-6 rounded-[2rem] border transition-all flex flex-col items-center gap-4 ${selectedNiche === n.id ? 'active-blue' : 'text-zinc-500'}`}>
                      <i className={`${n.icon} text-4xl ${selectedNiche === n.id ? 'text-black' : 'text-accent'}`}></i>
                      <span className="text-[9px] font-black uppercase tracking-[0.2em]">{n.name}</span>
                    </button>
                  ))}
                </div>

                <textarea 
                  value={freePrompt}
                  onChange={e=>{setFreePrompt(e.target.value); setSelectedNiche('');}}
                  placeholder="DIGITE O PROMPT MANUAL AQUI..."
                  className="cyber-input w-full rounded-[2rem] p-8 text-sm h-40 outline-none transition-all resize-none font-bold placeholder:text-zinc-800 leading-relaxed"
                />
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
                  <div className="space-y-2">
                     <label className="text-[9px] font-black text-zinc-600 uppercase tracking-widest ml-2">Nicho Customizado</label>
                     <input type="text" value={customNiche} onChange={e=>setCustomNiche(e.target.value)} placeholder="EX: ODONTOPEDIATRA" className="cyber-input w-full rounded-2xl p-5 text-[11px] font-black outline-none text-accent" />
                  </div>
                  <div className="space-y-2">
                     <label className="text-[9px] font-black text-zinc-600 uppercase tracking-widest ml-2">Elementos na Imagem</label>
                     <input type="text" value={extraDetails} onChange={e=>setExtraDetails(e.target.value)} placeholder="EX: BALÕES, NEON, ESTETOSCÓPIO" className="cyber-input w-full rounded-2xl p-5 text-[11px] font-black outline-none text-zinc-400" />
                  </div>
                </div>
              </section>

              {/* RESULTADOS */}
              {prompts.length > 0 && (
                <div className="flex flex-col gap-6 animate-fade-in">
                  <button onClick={()=>{
                      const text = prompts.map((p,i)=>`Prompt ${i+1}:\n${p.prompt}`).join('\n\n');
                      navigator.clipboard.writeText(text);
                    }} className="active-blue w-full py-6 rounded-[2rem] font-black uppercase tracking-[0.5em] text-xs">
                    Copiar Todos na Ordem (Prompt 1, 2...)
                  </button>
                  {prompts.map((p, i) => (
                    <div key={p.id} className="bg-panel p-10 rounded-[3rem] neon-panel relative group">
                      <span className="text-[9px] font-black text-accent uppercase tracking-[0.5em] mb-4 block">Objeto Codex #{String(i+1).padStart(2, '0')}</span>
                      <p className="text-[11px] font-mono text-zinc-400 leading-loose break-words bg-black/40 p-8 rounded-3xl border border-dashed border-white/5">{p.prompt}</p>
                      <button onClick={()=>navigator.clipboard.writeText(p.prompt)} className="absolute top-10 right-10 w-12 h-12 rounded-2xl bg-accent/5 text-accent flex items-center justify-center hover:bg-accent hover:text-black transition-all"><i className="ph-duotone ph-copy text-2xl"></i></button>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* COLUNA DIREITA FIXA */}
            <div className="lg:col-span-4">
              <div className="sticky top-32 flex flex-col gap-10">
                <section className="bg-panel p-10 rounded-[3.5rem] neon-panel relative overflow-hidden">
                  <div className="flex items-center gap-4 mb-10">
                    <div className="w-10 h-10 icon-squircle bg-white text-black flex items-center justify-center">
                      <i className="ph-duotone ph-cpu text-2xl"></i>
                    </div>
                    <h2 className="text-[11px] font-black uppercase tracking-[0.3em] text-zinc-600">Hardware Pro</h2>
                  </div>

                  <div className="flex flex-col gap-10">
                    <div>
                      <div className="flex justify-between mb-5">
                        <label className="text-[9px] font-black uppercase tracking-[0.4em] text-zinc-500">Volume</label>
                        <span className="text-[10px] font-black text-accent italic tracking-widest">{settings.quantity}X UNIDADES</span>
                      </div>
                      <input type="range" min="1" max="20" value={settings.quantity} onChange={e=>setSettings({...settings, quantity: e.target.value})} className="w-full accent-accent h-1.5 rounded-full appearance-none cursor-pointer bg-black" />
                    </div>

                    <div className="space-y-8">
                      <div>
                        <label className="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-600 block mb-4">Estilo Visual</label>
                        <div className="grid grid-cols-2 gap-3">
                          {['Ultra-realista', 'Luxo Premium', 'Estúdio', 'Cinematográfico'].map(s => (
                            <ControlButton key={s} label={s} active={visualStyle === s} onClick={()=>setVisualStyle(s)} />
                          ))}
                        </div>
                      </div>

                      <div>
                        <label className="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-600 block mb-4">Realismo</label>
                        <div className="grid grid-cols-3 gap-3">
                          {['natural', 'premium', 'cine'].map(r => (
                            <ControlButton key={r} label={r} active={settings.realismLevel === r} onClick={()=>setSettings({...settings, realismLevel: r})} />
                          ))}
                        </div>
                      </div>

                      <div>
                        <label className="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-600 block mb-4">Proporção</label>
                        <div className="grid grid-cols-2 gap-3">
                          {['9:16 Vertical', '16:9 Horizontal', '1:1 Quadrado', '4:5 Feed'].map(a => (
                            <ControlButton key={a} label={a} active={aspectRatio === a} onClick={()=>setAspectRatio(a)} />
                          ))}
                        </div>
                      </div>
                    </div>

                    <button 
                      onClick={generate}
                      disabled={isGenerating || (!selectedNiche && !customNiche && !freePrompt)}
                      className="active-blue w-full py-8 rounded-[2rem] font-black uppercase tracking-[0.6em] flex items-center justify-center gap-5 text-[10px] disabled:opacity-20 transition-all hover:scale-[1.02] shadow-[0_20px_40px_rgba(0,242,255,0.3)]"
                    >
                      {isGenerating ? <i className="ph ph-spinner-gap ph-spin text-3xl"></i> : 'FORJAR PROMPTS'}
                    </button>
                  </div>
                </section>
              </div>
            </div>
          </main>
        </div>
      );
    }

    function LoginScreen() {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true);
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert("NEGADO: SISTEMA PROTEGIDO");
        setLoading(false);
      };

      return (
        <div className="min-h-screen bg-background flex items-center justify-center p-8">
          <form onSubmit={handleLogin} className="w-full max-w-md bg-panel p-16 rounded-[4rem] flex flex-col gap-10 shadow-[0_0_100px_rgba(0,0,0,1)] border border-white/5 relative overflow-hidden">
            <div className="text-center">
              <div className="w-24 h-24 icon-squircle bg-accent rounded-[2.5rem] mx-auto mb-10 flex items-center justify-center shadow-[0_0_50px_rgba(0,242,255,0.4)]">
                <i className="ph-duotone ph-fingerprint text-5xl text-black"></i>
              </div>
              <h1 className="text-3xl font-black uppercase text-white italic tracking-tighter">STUDIO<span className="text-neonGreen">PRO</span></h1>
              <p className="text-zinc-700 text-[10px] font-black uppercase tracking-[0.5em] mt-4 leading-none">authorized access only</p>
            </div>
            <div className="space-y-4">
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="IDENTIFICAÇÃO" className="cyber-input w-full p-6 rounded-2xl outline-none font-black text-white" />
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="SENHA" className="cyber-input w-full p-6 rounded-2xl outline-none font-black text-white" />
            </div>
            <button className="active-blue w-full py-6 rounded-3xl font-black uppercase tracking-[0.4em] text-xs transition-all hover:scale-105 active:scale-95">
              ENTRAR
            </button>
          </form>
        </div>
      );
    }

    function App() {
      const [session, setSession] = useState(null);
      const [loading, setLoading] = useState(true);
      const [isDark, setIsDark] = useState(true);

      useEffect(() => {
        document.documentElement.classList.add('dark');
        supabase.auth.getSession().then(({ data: { session } }) => { setSession(session); setLoading(false); });
        supabase.auth.onAuthStateChange((_event, session) => setSession(session));
      }, []);

      const toggleTheme = () => {
        const newTheme = !isDark;
        setIsDark(newTheme);
        if (newTheme) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      };

      if (loading) return null;
      return session ? <MainApp onLogout={()=>supabase.auth.signOut()} isDark={isDark} toggleTheme={toggleTheme} /> : <LoginScreen />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
