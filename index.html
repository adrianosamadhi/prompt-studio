<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Prompt Consistency Studio Pro</title>
  
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#10111B" />
  <link rel="icon" type="image/png" href="icone-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200..800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { 
            panelDark: '#10111B',
            cinzaGPT: '#343540',
            cinzaClaro: '#C1C1C3',
            accent: '#00f2ff', 
            greenSolid: '#05F0BD', 
            greenTransp: '#05F0BD2E',
            blueSolid: '#006DF0'
          },
          fontFamily: { 
            sans: ['Plus Jakarta Sans', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace']
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      transition: background 0.5s ease;
      min-height: 100vh;
    }

    /* =========================================
       FUNDO ESCURO: RADIAL + PONTOS DE LUZ
       ========================================= */
    html.dark body {
      background-color: #10111B;
      background-image: 
        radial-gradient(circle at 15% 20%, rgba(5, 240, 189, 0.08) 0%, transparent 35%),
        radial-gradient(circle at 85% 75%, rgba(5, 240, 189, 0.08) 0%, transparent 35%),
        radial-gradient(circle at center, #343540 0%, #10111B 80%);
      background-attachment: fixed;
    }

    /* MODO ESCURO - Bordas e Painéis */
    html.dark .neon-panel {
      background-color: rgba(16, 17, 27, 0.6); 
      backdrop-filter: blur(16px);
      border: 2px solid #05F0BD2E;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    html.dark .neon-panel:hover {
      transform: scale(1.01);
    }

    /* =========================================
       MODO CLARO: REFINAÇÃO DE CONTRASTE EXTREMO
       ========================================= */
    html:not(.dark) body {
      background: #f4f4f4; 
    }
    
    html:not(.dark) .neon-panel {
      background-color: #C1C1C3 !important; 
      border: 2px solid #343540 !important; 
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.20) !important; 
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    html:not(.dark) .neon-panel:hover {
      transform: scale(1.01);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25) !important;
    }

    html:not(.dark) .neon-panel h1, 
    html:not(.dark) .neon-panel h2, 
    html:not(.dark) .neon-panel span:not(.text-greenSolid):not(.text-blueSolid):not(.text-gradient), 
    html:not(.dark) .neon-panel p, 
    html:not(.dark) .neon-panel label {
      color: #18181b !important;
    }

    html:not(.dark) .btn-tech, 
    html:not(.dark) .btn-niche {
      background-color: #e4e4e7; 
      border-color: #343540 !important; 
      color: #18181b !important; 
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15); 
    }

    /* =========================================
       BOTÕES TÉCNICOS (Hardware Pro)
       ========================================= */
    .btn-tech {
      background-color: transparent;
      border: 1px solid #52525b; 
      color: #a1a1aa; 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .btn-tech:hover {
      border-color: #006DF0 !important; 
      color: #006DF0 !important; 
      transform: scale(1.05);
    }
    
    .active-tech {
      background-color: rgba(5, 240, 189, 0.05); 
      border-color: #05F0BD !important; 
      color: #05F0BD !important; 
      transform: scale(1.05); 
    }

    html:not(.dark) .btn-tech:hover {
      border-color: #006DF0 !important;
      color: #006DF0 !important;
      background-color: #ffffff !important;
    }
    html:not(.dark) .active-tech {
      background-color: #ffffff !important;
      border-color: #05F0BD !important;
      color: #05F0BD !important;
    }

    /* =========================================
       CARTÕES DE NICHO (Missão Técnica)
       ========================================= */
    .btn-niche {
      background-color: transparent;
      border: 1px solid #52525b; 
      color: #a1a1aa; 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .btn-niche i {
      color: #05F0BD !important; 
      transition: none;
    }

    .btn-niche:hover {
      border-color: #05F0BD !important; 
      color: #05F0BD !important; 
      transform: scale(1.05);
    }
    
    .active-niche {
      background-color: rgba(0, 109, 240, 0.05); 
      border-color: #006DF0 !important; 
      color: #006DF0 !important; 
      transform: scale(1.05); 
    }

    html:not(.dark) .btn-niche:hover {
      border-color: #05F0BD !important;
      color: #05F0BD !important;
      background-color: #ffffff !important;
    }
    html:not(.dark) .active-niche {
      background-color: #ffffff !important;
      border-color: #006DF0 !important;
      color: #006DF0 !important;
    }

    /* =========================================
       BOTÃO FORJAR PROMPTS E ENTRAR (Branco com Borda Verde)
       ========================================= */
    .btn-forjar {
      background-color: #ffffff !important;
      color: #343540 !important; /* Texto Escuro Cinza GPT */
      border: 2px solid #05F0BD !important; /* Borda Verde da Paleta */
      box-shadow: 0 10px 25px rgba(5, 240, 189, 0.15);
      transition: all 0.3s ease;
    }
    .btn-forjar:hover {
      transform: scale(1.02);
      box-shadow: 0 15px 35px rgba(5, 240, 189, 0.3);
    }
    .btn-forjar i {
      color: #343540 !important;
      -webkit-text-fill-color: initial !important;
      background: none !important;
    }

    /* Inputs */
    .cyber-input {
      background: rgba(13, 13, 17, 0.6);
      border: 1px solid #27272a;
      color: #fff;
      transition: all 0.3s ease;
    }
    .cyber-input:focus {
      border-color: #006DF0;
      box-shadow: 0 0 15px rgba(0, 109, 240, 0.15);
      outline: none;
    }

    html:not(.dark) .cyber-input {
      background: #f4f4f4 !important;
      border: 1px solid #343540 !important; 
      color: #18181b !important;
    }
    html:not(.dark) .cyber-input::placeholder {
      color: #52525b !important;
    }

    /* GRADIENTES ESTÁTICOS DOS CABEÇALHOS (Modo Escuro) */
    html.dark .icon-tech-gradient {
      background: linear-gradient(135deg, #05F0BD2E 0%, #05F0BD2E 20%, #006DF0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }
    html.dark .logo-gradient {
      background: linear-gradient(135deg, #05F0BD 0%, #006DF0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    html:not(.dark) .icon-tech-gradient {
      background: none !important;
      -webkit-text-fill-color: initial !important;
      color: #05F0BD !important;
    }

    .icon-squircle { border-radius: 30%; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #05F0BD; border-radius: 10px; }
    
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="text-zinc-900 dark:text-zinc-100 selection:bg-blueSolid/40 overflow-x-hidden antialiased">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const SUPABASE_URL = "https://wvejrqpwmodgfjtxperb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Co_Sc9s65LlNw2L1a19EBw_enm2KWFp";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const GEMINI_MODELS = ["gemini-3.1-pro-preview", "gemini-3.1-flash-lite"];

    async function fetchWithRetry(payload, retries = 3) {
      for (let m = 0; m < GEMINI_MODELS.length; m++) {
        const currentModel = GEMINI_MODELS[m];
        for (let i = 0; i < retries; i++) {
          try {
            const { data, error } = await supabase.functions.invoke('gerar-prompt', {
              body: JSON.stringify({ model: currentModel, payload: payload })
            });
            if (error) throw error;
            return data;
          } catch (e) {
            if (i === retries - 1 && m === GEMINI_MODELS.length - 1) throw e;
            await new Promise(res => setTimeout(res, 1000));
          }
        }
      }
    }

    async function generatePromptsAPI({ imagePreviews, niche, customNiche, freePrompt, extraDetails, visualStyle, aspectRatio, settings }) {
      const targetNiche = customNiche.trim() !== '' ? customNiche : niche;
      const qty = settings?.quantity || 10;
      const arParam = "--ar " + aspectRatio.split(' ')[0];

      const systemInstruction = `ROLE: Deterministic Prompt-to-JSON Engine. Biometric Analyzer. Append "${arParam}" to all prompt strings.`;
      let promptText = freePrompt.trim() !== '' 
        ? `Variations for: "${freePrompt}". Style: ${visualStyle}. Format: ${arParam}.`
        : `Niche: ${targetNiche}. Style: ${visualStyle}. Realism: ${settings.realismLevel}. Format: ${arParam}.`;

      const payload = {
        systemInstruction: { parts: [{ text: systemInstruction }] },
        contents: [{ role: "user", parts: [{ text: promptText }] }],
        generationConfig: { responseMimeType: "application/json" }
      };

      if (imagePreviews.length > 0) {
        imagePreviews.forEach((preview) => {
          const base64Data = preview.split(',')[1];
          const mimeType = preview.split(';')[0].split(':')[1];
          payload.contents[0].parts.push({ inlineData: { mimeType, data: base64Data } });
        });
      }

      const data = await fetchWithRetry(payload);
      const textResult = data.candidates?.[0]?.content?.parts?.[0]?.text || "[]";
      return JSON.parse(textResult).map(item => ({ prompt: item.prompt, id: crypto.randomUUID() }));
    }

    function ControlButton({ label, active, onClick }) {
      return (
        <button 
          onClick={onClick}
          className={`btn-tech px-4 py-3 text-[10px] font-extrabold uppercase tracking-[0.2em] rounded-xl transition-all duration-300 ${
            active ? 'active-tech' : ''
          }`}
        >
          {label}
        </button>
      );
    }

    const NICHES = [
      { id: 'profissoes', name: 'Profissões', icon: 'ph-bold ph-briefcase-metal' },
      { id: 'casamento', name: 'Casamento', icon: 'ph-bold ph-star-four' },
      { id: 'infantil', name: 'Infantil', icon: 'ph-bold ph-balloon' },
      { id: 'gravidez', name: 'Gestante', icon: 'ph-bold ph-baby' },
      { id: 'influencer', name: 'Influencer', icon: 'ph-bold ph-instagram-logo' },
      { id: 'fitness', name: 'Fitness', icon: 'ph-bold ph-barbell' },
      { id: 'aniversario', name: 'Aniversário', icon: 'ph-bold ph-cake' },
      { id: 'moda', name: 'Moda', icon: 'ph-bold ph-coat-hanger' },
      { id: 'restauracao', name: 'Restauração', icon: 'ph-bold ph-image-square' } 
    ];

    function MainApp({ onLogout, isDark, toggleTheme }) {
      const [imagePreviews, setImagePreviews] = useState([]);
      const [selectedNiche, setSelectedNiche] = useState('');
      const [customNiche, setCustomNiche] = useState('');
      const [freePrompt, setFreePrompt] = useState('');
      const [extraDetails, setExtraDetails] = useState('');
      const [prompts, setPrompts] = useState([]);
      const [isGenerating, setIsGenerating] = useState(false);
      const [history, setHistory] = useState([]);
      const [showHistory, setShowHistory] = useState(false);

      const [visualStyle, setVisualStyle] = useState('Ultra-realista');
      const [aspectRatio, setAspectRatio] = useState('9:16 Vertical');
      const [settings, setSettings] = useState({ quantity: 10, realismLevel: 'natural' });

      const handleImageUpload = (e) => {
        const files = Array.from(e.target.files);
        files.forEach(file => {
          const reader = new FileReader();
          reader.onloadend = () => setImagePreviews(prev => [...prev, reader.result]);
          reader.readAsDataURL(file);
        });
      };

      const generate = async () => {
        setIsGenerating(true);
        try {
          const result = await generatePromptsAPI({
            imagePreviews, niche: selectedNiche, customNiche, freePrompt, extraDetails,
            visualStyle, aspectRatio, settings
          });
          setPrompts(result);
          setHistory(prev => [{ date: new Date().toLocaleTimeString(), data: result }, ...prev]);
        } catch (e) { alert("Erro: " + e.message); }
        finally { setIsGenerating(false); }
      };

      return (
        <div className="min-h-screen flex flex-col">
          <header className="sticky top-0 z-50 bg-white/90 dark:bg-panelDark/80 backdrop-blur-xl border-b border-zinc-200 dark:border-white/5 px-10 py-5 flex items-center justify-between shadow-lg">
            <div className="flex items-center gap-5">
               <div className="w-12 h-12 icon-squircle active-tech flex items-center justify-center">
                  <i className="ph-bold ph-aperture text-3xl icon-tech-gradient" style={selectedNiche ? {} : {color: '#ffffff', background: 'none', webkitTextFillColor: 'initial'}}></i>
               </div>
               <div>
                  <h1 className="text-xl font-black uppercase italic tracking-tighter text-zinc-900 dark:text-white leading-none">Studio<span className="logo-gradient ml-1">Pro</span></h1>
                  <span className="text-[8px] font-extrabold text-zinc-500 uppercase tracking-[0.4em]">Engineered by Adriano</span>
               </div>
            </div>
            <div className="flex items-center gap-4">
              <button onClick={() => setShowHistory(!showHistory)} className="btn-tech px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-[0.2em] !border-zinc-500">
                Arquivo de Consultas
              </button>
              <button onClick={toggleTheme} className="w-11 h-11 rounded-xl border border-zinc-200 dark:border-white/5 flex items-center justify-center text-zinc-500 dark:text-zinc-400 hover:text-blueSolid transition-all">
                {isDark ? <i className="ph-bold ph-sun-dim text-2xl"></i> : <i className="ph-bold ph-moon-stars text-2xl"></i>}
              </button>
              <button onClick={onLogout} className="w-11 h-11 rounded-xl bg-red-600/10 text-red-500 hover:bg-red-600 hover:text-white transition-all flex items-center justify-center">
                <i className="ph-bold ph-power text-xl"></i>
              </button>
            </div>
          </header>

          <main className="max-w-[1600px] mx-auto w-full p-10 grid grid-cols-1 lg:grid-cols-12 gap-10 relative z-10">
            
            <div className="lg:col-span-8 flex flex-col gap-10">
              {/* PASSO 1: SCAN DE IDENTIDADE */}
              <section className="fade-in neon-panel p-10 rounded-[2.5rem] relative overflow-hidden">
                <div className="flex items-center gap-4 mb-10">
                  <div className="w-10 h-10 icon-squircle bg-zinc-100 dark:bg-zinc-800/50 flex items-center justify-center">
                    <i className="ph-bold ph-scan text-2xl icon-tech-gradient"></i>
                  </div>
                  <h2 className="text-[11px] font-black uppercase tracking-[0.3em] text-zinc-500 dark:text-zinc-400">Scan de Identidade</h2>
                </div>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                  {imagePreviews.map((src, i) => (
                    <div key={i} className="relative aspect-square rounded-[1.5rem] overflow-hidden border-2 border-blueSolid shadow-lg group">
                      <img src={src} className="w-full h-full object-cover transition-transform duration-300 group-hover:scale-110" />
                      <button onClick={()=>setImagePreviews(prev=>prev.filter((_,idx)=>idx!==i))} className="absolute top-2 right-2 w-7 h-7 bg-red-600 text-white rounded-lg flex items-center justify-center shadow-lg"><i className="ph-bold ph-trash-simple"></i></button>
                    </div>
                  ))}
                  <label className="aspect-square rounded-[1.5rem] border-2 border-dashed border-zinc-300 dark:border-white/10 flex flex-col items-center justify-center cursor-pointer hover:border-blueSolid transition-all group">
                    <i className="ph-bold ph-user-focus text-4xl icon-tech-gradient"></i>
                    <input type="file" className="hidden" onChange={handleImageUpload} />
                  </label>
                </div>
              </section>

              {/* PASSO 2: MISSÃO TÉCNICA */}
              <section className="fade-in neon-panel p-10 rounded-[2.5rem]" style={{animationDelay: '0.1s'}}>
                <div className="flex items-center gap-4 mb-10">
                  <div className="w-10 h-10 icon-squircle bg-zinc-100 dark:bg-zinc-800/50 flex items-center justify-center">
                    <i className="ph-bold ph-target text-2xl icon-tech-gradient"></i>
                  </div>
                  <h2 className="text-[11px] font-black uppercase tracking-[0.3em] text-zinc-500 dark:text-zinc-400">Missão Técnica</h2>
                </div>
                
                <div className="grid grid-cols-2 md:grid-cols-3 gap-5 mb-10">
                  {NICHES.map(n => (
                    <button key={n.id} onClick={()=>{setSelectedNiche(n.id); setFreePrompt('');}} className={`btn-niche p-6 rounded-[1.5rem] flex flex-col items-center gap-4 ${selectedNiche === n.id ? 'active-niche' : ''}`}>
                      <i className={`${n.icon} text-4xl`} style={selectedNiche === n.id ? {} : { color: 'inherit' }}></i>
                      <span className="text-[9px] font-black uppercase tracking-[0.2em]">{n.name}</span>
                    </button>
                  ))}
                </div>

                <textarea 
                  value={freePrompt}
                  onChange={e=>{setFreePrompt(e.target.value); setSelectedNiche('');}}
                  placeholder="ESCREVA O CÓDIGO DA MISSÃO (PROMPT MANUAL)..."
                  className="cyber-input w-full rounded-[1.5rem] p-8 text-sm h-40 resize-none font-bold placeholder:text-zinc-400 dark:placeholder:text-zinc-700 leading-relaxed"
                />
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
                  <div className="space-y-2">
                     <label className="text-[9px] font-black text-zinc-500 dark:text-zinc-400 uppercase tracking-widest ml-2">Nicho Customizado</label>
                     <input type="text" value={customNiche} onChange={e=>setCustomNiche(e.target.value)} placeholder="EX: ODONTOPEDIATRA" className="cyber-input w-full rounded-2xl p-5 text-[11px] font-black text-greenSolid" />
                  </div>
                  <div className="space-y-2">
                     <label className="text-[9px] font-black text-zinc-500 dark:text-zinc-400 uppercase tracking-widest ml-2">Elementos Específicos</label>
                     <input type="text" value={extraDetails} onChange={e=>setExtraDetails(e.target.value)} placeholder="EX: BALÕES, NEON, ESTETOSCÓPIO" className="cyber-input w-full rounded-2xl p-5 text-[11px] font-black text-zinc-500 dark:text-zinc-400" />
                  </div>
                </div>
              </section>

              {/* RESULTADOS */}
              {prompts.length > 0 && (
                <div className="flex flex-col gap-6 animate-fade-in">
                  <button onClick={()=>{
                      const text = prompts.map((p,i)=>`Prompt ${i+1}:\n${p.prompt}`).join('\n\n');
                      navigator.clipboard.writeText(text);
                    }} className="btn-forjar w-full py-6 rounded-[1.5rem] font-black uppercase tracking-[0.5em] text-xs transition-all">
                    Copiar Todos na Ordem (Prompt 1, 2...)
                  </button>
                  <div className="flex flex-col gap-5">
                    {prompts.map((p, i) => (
                      <div key={p.id} className="neon-panel p-10 rounded-[2.5rem] relative group">
                        <span className="text-[10px] font-black text-blueSolid uppercase tracking-[0.5em] mb-4 block">Objeto Codex #{String(i+1).padStart(2, '0')}</span>
                        <p className="text-[11px] font-mono text-zinc-600 dark:text-zinc-400 leading-loose break-words bg-zinc-50 dark:bg-black/40 p-8 rounded-3xl border border-dashed border-zinc-200 dark:border-white/5">{p.prompt}</p>
                        <button onClick={()=>navigator.clipboard.writeText(p.prompt)} className="absolute top-10 right-10 w-12 h-12 rounded-2xl bg-blueSolid/10 text-blueSolid flex items-center justify-center hover:bg-blueSolid hover:text-white transition-all"><i className="ph-bold ph-copy text-2xl icon-tech-gradient"></i></button>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>

            {/* COLUNA DIREITA FIXA: HARDWARE PRO */}
            <div className="lg:col-span-4">
              <div className="sticky top-32 flex flex-col gap-10">
                <section className="fade-in neon-panel p-10 rounded-[3rem] relative overflow-hidden" style={{animationDelay: '0.2s'}}>
                  <div className="flex items-center gap-4 mb-10">
                    <div className="w-10 h-10 icon-squircle bg-zinc-100 dark:bg-white text-zinc-900 dark:text-black flex items-center justify-center">
                      <i className="ph-bold ph-cpu text-2xl icon-tech-gradient" style={{color: '#000', background: 'none', webkitTextFillColor: 'initial'}}></i>
                    </div>
                    <h2 className="text-[11px] font-black uppercase tracking-[0.3em] text-zinc-500 dark:text-zinc-400">Hardware Pro</h2>
                  </div>

                  <div className="flex flex-col gap-10">
                    <div>
                      <div className="flex justify-between mb-5">
                        <label className="text-[9px] font-black uppercase tracking-[0.4em] text-zinc-500">Volume</label>
                        <span className="text-[10px] font-black text-blueSolid italic tracking-widest">{settings.quantity}X UNIDADES</span>
                      </div>
                      <input type="range" min="1" max="20" value={settings.quantity} onChange={e=>setSettings({...settings, quantity: e.target.value})} className="w-full accent-blueSolid h-1.5 rounded-full appearance-none cursor-pointer bg-zinc-200 dark:bg-panelDark" />
                    </div>

                    <div className="space-y-8">
                      <div>
                        <label className="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-500 dark:text-zinc-600 block mb-4">Estilo Visual</label>
                        <div className="grid grid-cols-2 gap-3">
                          {['Ultra-realista', 'Luxo Premium', 'Estúdio', 'Cinematográfico'].map(s => (
                            <ControlButton key={s} label={s} active={visualStyle === s} onClick={()=>setVisualStyle(s)} />
                          ))}
                        </div>
                      </div>

                      <div>
                        <label className="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-500 dark:text-zinc-600 block mb-4">Realismo</label>
                        <div className="grid grid-cols-3 gap-3">
                          {['natural', 'premium', 'cine'].map(r => (
                            <ControlButton key={r} label={r} active={settings.realismLevel === r} onClick={()=>setSettings({...settings, realismLevel: r})} />
                          ))}
                        </div>
                      </div>

                      <div>
                        <label className="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-500 dark:text-zinc-600 block mb-4">Proporção</label>
                        <div className="grid grid-cols-2 gap-3">
                          {['9:16 Vertical', '16:9 Horizontal', '1:1 Quadrado', '4:5 Feed'].map(a => (
                            <ControlButton key={a} label={a} active={aspectRatio === a} onClick={()=>setAspectRatio(a)} />
                          ))}
                        </div>
                      </div>
                    </div>

                    <button 
                      onClick={generate}
                      disabled={isGenerating || (!selectedNiche && !customNiche && !freePrompt)}
                      className="btn-forjar w-full py-8 rounded-[2rem] font-black uppercase tracking-[0.6em] flex items-center justify-center gap-5 text-[10px] disabled:opacity-30 disabled:grayscale transition-all"
                    >
                      {isGenerating ? <i className="ph-bold ph-arrows-clockwise ph-spin text-3xl"></i> : 'FORJAR PROMPTS'}
                    </button>
                  </div>
                </section>
              </div>
            </div>
          </main>
        </div>
      );
    }

    function LoginScreen({ isDark, toggleTheme }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true);
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert("NEGADO");
        setLoading(false);
      };

      return (
        <div className="min-h-screen bg-zinc-50 dark:bg-background flex items-center justify-center p-8 transition-all relative">
          <form onSubmit={handleLogin} className="w-full max-w-md neon-panel p-16 rounded-[4rem] flex flex-col gap-10 relative z-10">
            <div className="text-center">
              <div className="w-24 h-24 icon-squircle active-tech mx-auto mb-10 flex items-center justify-center">
                <i className="ph-fill ph-fingerprint text-5xl icon-tech-gradient"></i>
              </div>
              <h1 className="text-3xl font-black uppercase italic tracking-tighter text-zinc-900 dark:text-white">STUDIO<span className="logo-gradient ml-1">PRO</span></h1>
              <p className="text-zinc-500 text-[10px] font-black uppercase tracking-[0.5em] mt-3 leading-none">authorized access only</p>
            </div>
            <div className="space-y-4">
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="USUÁRIO" className="cyber-input w-full p-5 rounded-2xl font-bold text-xs tracking-widest" />
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="SENHA" className="cyber-input w-full p-5 rounded-2xl font-bold text-xs tracking-widest" />
            </div>
            <button className="btn-forjar w-full py-6 rounded-3xl font-black uppercase tracking-[0.4em] text-xs transition-all">
              ENTRAR
            </button>
            <div className="flex justify-center mt-2">
              <button type="button" onClick={toggleTheme} className="text-zinc-400 hover:text-blueSolid transition-all">
                {isDark ? <i className="ph-bold ph-sun-dim text-3xl icon-tech-gradient"></i> : <i className="ph-bold ph-moon-stars text-3xl icon-tech-gradient"></i>}
              </button>
            </div>
          </form>
        </div>
      );
    }

    function App() {
      const [session, setSession] = useState(null);
      const [loading, setLoading] = useState(true);
      const [isDark, setIsDark] = useState(true);

      useEffect(() => {
        const storedTheme = localStorage.getItem('theme');
        if (storedTheme === 'light') {
          setIsDark(false);
          document.documentElement.classList.remove('dark');
        } else {
          setIsDark(true);
          document.documentElement.classList.add('dark');
        }
        supabase.auth.getSession().then(({ data: { session } }) => { setSession(session); setLoading(false); });
        supabase.auth.onAuthStateChange((_event, session) => setSession(session));
      }, []);

      const toggleTheme = () => {
        const newTheme = !isDark;
        setIsDark(newTheme);
        if (newTheme) {
          document.documentElement.classList.add('dark');
          localStorage.setItem('theme', 'dark');
        } else {
          document.documentElement.classList.remove('dark');
          localStorage.setItem('theme', 'light');
        }
      };

      if (loading) return null;
      return session ? <MainApp onLogout={()=>supabase.auth.signOut()} isDark={isDark} toggleTheme={toggleTheme} /> : <LoginScreen isDark={isDark} toggleTheme={toggleTheme} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
